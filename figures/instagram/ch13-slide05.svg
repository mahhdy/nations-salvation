<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { direction:rtl; font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif; }
      .bg { fill:#0c0812; }
      .header-bar { fill:#1A237E; }
      .accent { fill:#F9A825; }
      .card { fill:#12101e; stroke:#311B92; stroke-width:1.4; rx:28; ry:28; }
      .gold-card { fill:#1a1810; stroke:#F9A825; stroke-width:2; rx:28; ry:28; }
      .shadow { filter:drop-shadow(0px 16px 36px rgba(0,0,0,0.45)); }
      .title { font-size:46px; font-weight:800; color:#FFFFFF; }
      .card-title { font-size:30px; font-weight:700; color:#FFFFFF; }
      .card-text { font-size:25px; line-height:1.7; color:#ECEFF1; }
      .gold { color:#F9A825; font-weight:700; }
      .pink { color:#F48FB1; font-weight:700; }
      .red { color:#EF5350; font-weight:700; }
      .green { color:#69F0AE; font-weight:700; }
      .footer { font-size:24px; color:#78909C; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="1350"/>

  <rect class="header-bar" x="60" y="60" width="960" height="90" rx="22"/>
  <rect class="accent" x="80" y="82" width="10" height="46" rx="5"/>
  <foreignObject x="110" y="70" width="900" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;align-items:center;color:#FFF;font-size:28px;font-weight:600;">
      <span>جمع‌بندی فصل ۱۳</span>
      <span style="opacity:0.8;">ملت‌ها و نجات‌بخشی</span>
    </div>
  </foreignObject>

  <foreignObject x="80" y="180" width="920" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="title">🎯 سه نتیجه‌ی کلیدی فصل ۱۳</div>
    </div>
  </foreignObject>

  <!-- Result 1 -->
  <rect class="gold-card shadow" x="80" y="290" width="920" height="230"/>
  <foreignObject x="100" y="310" width="880" height="190">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="card-title"><span class="gold">۱.</span> ایدئولوژی «پیش‌قراول» مداخله است</div>
      <div class="card-text" style="margin-top:14px;">
        قبل از لشکر، <span class="pink">ایده</span> وارد می‌شود. میسیونر قبل از سرباز،
        رادیو قبل از بمب‌افکن، NGO قبل از ناو هواپیمابر.
        <span class="gold">تسهیل‌گری فرهنگی</span> زمینه‌ساز پذیرش مداخله‌ی سخت است.
      </div>
    </div>
  </foreignObject>

  <!-- Result 2 -->
  <rect class="gold-card shadow" x="80" y="550" width="920" height="230"/>
  <foreignObject x="100" y="570" width="880" height="190">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="card-title"><span class="gold">۲.</span> هیچ ایدئولوژی صادراتی واقعاً «جهان‌شمول» نیست</div>
      <div class="card-text" style="margin-top:14px;">
        مسیحیتِ صادراتی = استعمار. کمونیسمِ صادراتی = اشغال.
        اسلامِ سیاسیِ صادراتی = جنگ نیابتی. دموکراسیِ صادراتی = تغییر رژیم.
        <span class="red">شعار تغییر می‌کند، الگو تکرار می‌شود.</span>
      </div>
    </div>
  </foreignObject>

  <!-- Result 3 -->
  <rect class="gold-card shadow" x="80" y="810" width="920" height="230"/>
  <foreignObject x="100" y="830" width="880" height="190">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="card-title"><span class="gold">۳.</span> دفاع واقعی: سواد رسانه‌ای و تفکر انتقادی</div>
      <div class="card-text" style="margin-top:14px;">
        ملتی که بتواند <span class="green">بین «اطلاع‌رسانی» و «عملیات نفوذ»</span>
        تمایز بگذارد، سخت‌ترین هدف برای تسهیل‌گری فرهنگی است.
        بهترین سپر در برابر ایدئولوژیِ وارداتی: <span class="green">آموزش</span>.
      </div>
    </div>
  </foreignObject>

  <!-- CTA -->
  <rect class="card shadow" x="80" y="1080" width="920" height="130"/>
  <foreignObject x="100" y="1095" width="880" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div style="font-size:28px;color:#F48FB1;font-weight:700;">
        📖 نمودار ون TikZ و جدول تطبیقی کامل همه‌ی ایدئولوژی‌ها → متن فصل ۱۳
      </div>
      <div style="font-size:24px;color:#90A4AE;margin-top:8px;">
        برای درک بهتر مرز باریک «تبلیغ» و «تسهیل‌گری مداخله»
      </div>
    </div>
  </foreignObject>

  <foreignObject x="80" y="1260" width="920" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" class="footer"
         style="display:flex;justify-content:space-between;align-items:center;">
      <span>nations_salvation@ • لینک مطالعه در بیو</span>
      <span>اسلاید ۵ از ۵</span>
    </div>
  </foreignObject>
</svg>
