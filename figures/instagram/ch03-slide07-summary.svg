<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <style>
      .rtl { direction: rtl; text-align: center; font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif; }
      .rtl-right { direction: rtl; text-align: right; font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif; padding-right: 15px; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#F9A825"/>
  <foreignObject x="660" y="30" width="380" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#0D1117; font-size:28px; font-weight:bold; line-height:50px;">فصل   خلاصه</div>
  </foreignObject>
  
  <!-- Title -->
  <foreignObject x="40" y="100" width="1000" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="font-size:52px; font-weight:bold; color:#A855F7;"> خلاصهی فصل </div>
  </foreignObject>
  
  <!-- Summary points box -->
  <rect x="60" y="180" width="960" height="520" rx="20" fill="#1A237E" fill-opacity="0.3" stroke="#1A237E" stroke-width="2"/>
  
  <!-- Point 1 -->
  <foreignObject x="80" y="205" width="920" height="38">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#00D9FF; font-size:28px; font-weight:bold;"> مدل ششوجهی:</div>
  </foreignObject>
  <foreignObject x="80" y="245" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;">هر مداخله باید از  بعد تحلیل شود.</div>
  </foreignObject>
  
  <!-- Point 2 -->
  <foreignObject x="80" y="295" width="920" height="38">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#4ADE80; font-size:28px; font-weight:bold;"> شاخصهای موفقیت:</div>
  </foreignObject>
  <foreignObject x="80" y="335" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;"> شرط لازم برای موفقیت مداخله.</div>
  </foreignObject>
  
  <!-- Point 3 -->
  <foreignObject x="80" y="385" width="920" height="38">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:28px; font-weight:bold;"> علائم هشدار:</div>
  </foreignObject>
  <foreignObject x="80" y="425" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;"> نشانهی خطر که فاجعه را پیشبینی میکنند.</div>
  </foreignObject>
  
  <!-- Point 4 -->
  <foreignObject x="80" y="475" width="920" height="38">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F9A825; font-size:28px; font-weight:bold;"> چکلیست تصمیمگیری:</div>
  </foreignObject>
  <foreignObject x="80" y="515" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;"> سوال کلیدی قبل از حمایت از مداخله.</div>
  </foreignObject>
  
  <!-- Point 5 -->
  <foreignObject x="80" y="565" width="920" height="38">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#EC4899; font-size:28px; font-weight:bold;"> الگوی تاریخی:</div>
  </foreignObject>
  <foreignObject x="80" y="605" width="920" height="55">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px; line-height:1.4;">مداخلات با شرایط کامل = موفقیت | بدون شرایط = فاجعه</div>
  </foreignObject>
  
  <!-- Key takeaway -->
  <rect x="100" y="730" width="880" height="130" rx="20" fill="none" stroke="#F9A825" stroke-width="3"/>
  <foreignObject x="100" y="755" width="880" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#F9A825; font-size:30px; font-weight:bold;"> پیام کلیدی:</div>
  </foreignObject>
  <foreignObject x="100" y="800" width="880" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#FFFFFF; font-size:26px;">تحلیل علمی جایگزین آرزواندیشی میشود.</div>
  </foreignObject>
  
  <!-- Next chapter preview -->
  <rect x="100" y="890" width="880" height="130" rx="20" fill="#2E7D32" fill-opacity="0.15" stroke="#2E7D32" stroke-width="2"/>
  <foreignObject x="100" y="910" width="880" height="42">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#4ADE80; font-size:32px; font-weight:bold;"> فصل بعدی:</div>
  </foreignObject>
  <foreignObject x="100" y="955" width="880" height="38">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#FFFFFF; font-size:28px;">ایران باستان</div>
  </foreignObject>
  <foreignObject x="100" y="995" width="880" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#94A3B8; font-size:22px;">از هخامنشیان تا ساسانیان   سال تجربه</div>
  </foreignObject>
  
  <!-- CTA -->
  <rect x="300" y="1050" width="480" height="65" rx="32" fill="url(#titleGrad)"/>
  <foreignObject x="300" y="1050" width="480" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#0D1117; font-size:28px; font-weight:bold; line-height:65px;">ذخیره کنید  | ادامه </div>
  </foreignObject>
  
  <foreignObject x="40" y="1140" width="1000" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#94A3B8; font-size:22px;">@nations_salvation | لینک کتاب در بیو</div>
  </foreignObject>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
