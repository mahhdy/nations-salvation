<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#080c18"/><stop offset="100%" stop-color="#12182d"/></linearGradient>
  <radialGradient id="gl" cx="50%" cy="38%" r="40%"><stop offset="0%" stop-color="#1a3565" stop-opacity=".5"/><stop offset="100%" stop-color="#12182d" stop-opacity="0"/></radialGradient>
  <linearGradient id="tg" x1="0" y1="0" x2="1" y2=".3"><stop offset="0%" stop-color="#00e5ff"/><stop offset="50%" stop-color="#b388ff"/><stop offset="100%" stop-color="#ff80ab"/></linearGradient>
  <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#0091ea"/></linearGradient>
  <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff4081"/><stop offset="100%" stop-color="#c51162"/></linearGradient>
  <filter id="gw"><feGaussianBlur stdDeviation="5"/><feComposite in="SourceGraphic" operator="over"/></filter>
  <filter id="sg"><feGaussianBlur stdDeviation="12"/><feComposite in="SourceGraphic" operator="over"/></filter>
</defs>
<rect width="1080" height="1350" fill="url(#bg)"/>
<rect width="1080" height="1350" fill="url(#gl)"/>
<g fill="#fff" opacity=".4"><circle cx="80" cy="60" r="1.2"/><circle cx="250" cy="140" r="1"/><circle cx="500" cy="80" r="1.5"/><circle cx="780" cy="50" r="1"/><circle cx="950" cy="160" r="1.3"/><circle cx="150" cy="300" r="1"/><circle cx="900" cy="350" r="1.2"/><circle cx="350" cy="1100" r="1"/><circle cx="700" cy="1200" r="1.3"/><circle cx="100" cy="900" r="1"/><circle cx="980" cy="1000" r="1.2"/></g>
<!-- badge -->
<rect x="680" y="30" width="370" height="44" rx="22" fill="#131d33" stroke="#253350" stroke-width="1"/>
<text x="865" y="59" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="18" fill="#5580aa" direction="rtl">معرفی کتاب • ۱ از ۵</text>
<!-- broken chain -->
<g transform="translate(440,340) rotate(-18)" filter="url(#gw)"><ellipse rx="45" ry="72" fill="none" stroke="url(#c1)" stroke-width="13"/></g>
<g transform="translate(650,355) rotate(18)" filter="url(#gw)"><ellipse rx="45" ry="72" fill="none" stroke="url(#c2)" stroke-width="13"/></g>
<g filter="url(#gw)" opacity=".85"><circle cx="555" cy="345" r="4" fill="#ffd740"/><circle cx="575" cy="360" r="3" fill="#ff4081"/><circle cx="540" cy="330" r="3" fill="#00e5ff"/><line x1="540" y1="340" x2="570" y2="315" stroke="#ffd740" stroke-width="2.5"/><line x1="560" y1="355" x2="590" y2="335" stroke="#69f0ae" stroke-width="2"/></g>
<!-- title -->
<text x="540" y="560" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="88" font-weight="900" fill="url(#tg)" direction="rtl" filter="url(#sg)">ناجی نمی‌آید</text>
<text x="540" y="640" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="30" fill="#8899aa" direction="rtl">تحلیل انتقادی نجات‌طلبی ملت‌ها از قدرت‌های بیگانه</text>
<line x1="260" y1="690" x2="820" y2="690" stroke="#253350" stroke-width="1.5"/>
<!-- hook card -->
<rect x="80" y="740" width="920" height="200" rx="18" fill="#131d33" stroke="#ff4081" stroke-width="1.5" opacity=".9"/>
<text x="540" y="820" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="34" font-weight="700" fill="#ff80ab" direction="rtl">آیا تاریخ نشان داده که</text>
<text x="540" y="870" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="34" font-weight="700" fill="#ff80ab" direction="rtl">ناجی بیرونی واقعاً نجات می‌دهد؟</text>
<text x="540" y="920" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="22" fill="#607080" direction="rtl">پاسخ را در این کتاب بخوانید...</text>
<!-- stat boxes -->
<rect x="80" y="1000" width="430" height="130" rx="14" fill="#111a2e" stroke="#00e5ff" stroke-width="1.2"/>
<text x="295" y="1055" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="42" font-weight="900" fill="#00e5ff" direction="rtl">۸۴٪</text>
<text x="295" y="1100" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#6688aa" direction="rtl">مداخلات خارجی شکست خورده‌اند</text>
<rect x="570" y="1000" width="430" height="130" rx="14" fill="#111a2e" stroke="#ffd740" stroke-width="1.2"/>
<text x="785" y="1055" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="42" font-weight="900" fill="#ffd740" direction="rtl">۱۵ فصل</text>
<text x="785" y="1100" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#6688aa" direction="rtl">از هخامنشیان تا بهار عربی</text>
<!-- bottom tag -->
<rect x="300" y="1200" width="480" height="50" rx="25" fill="#1a2540" stroke="#253350" stroke-width="1"/>
<text x="540" y="1233" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#5580aa" direction="rtl">تاریخ · حقوق · علوم سیاسی · روان‌شناسی</text>
</svg>