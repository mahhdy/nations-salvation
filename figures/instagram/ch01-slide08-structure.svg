<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#1A237E"/>
  <text x="850" y="65" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl">فصل   اسلاید  از </text>
  
  <!-- Title -->
  <text x="540" y="140" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" direction="rtl"> ساختار کتاب</text>
  
  <!-- Part 1 -->
  <rect x="60" y="180" width="960" height="90" rx="12" fill="#1A237E" fill-opacity="0.5" stroke="#1A237E" stroke-width="2"/>
  <text x="980" y="220" font-family="Vazirmatn, Tahoma" font-size="30" fill="#00D9FF" text-anchor="end" direction="rtl" font-weight="bold">بخش : مبانی نظری</text>
  <text x="980" y="255" font-family="Vazirmatn, Tahoma" font-size="24" fill="#94A3B8" text-anchor="end" direction="rtl">فصل -: مقدمه حقوق بینالملل مدل تحلیلی</text>
  
  <!-- Part 2 -->
  <rect x="60" y="285" width="960" height="130" rx="12" fill="#2E7D32" fill-opacity="0.2" stroke="#2E7D32" stroke-width="2"/>
  <text x="980" y="325" font-family="Vazirmatn, Tahoma" font-size="30" fill="#4ADE80" text-anchor="end" direction="rtl" font-weight="bold">بخش : ایران در تاریخ</text>
  <text x="980" y="365" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل : ایران باستان (هخامنشی تا ساسانی)</text>
  <text x="980" y="400" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل -: قرون میانه و اوایل مدرن</text>
  
  <!-- Part 3 -->
  <rect x="60" y="430" width="960" height="130" rx="12" fill="#F9A825" fill-opacity="0.2" stroke="#F9A825" stroke-width="2"/>
  <text x="980" y="470" font-family="Vazirmatn, Tahoma" font-size="30" fill="#F9A825" text-anchor="end" direction="rtl" font-weight="bold">بخش : ایران مدرن</text>
  <text x="980" y="510" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل : مشروطه تا پهلوی</text>
  <text x="980" y="545" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل : مداخلات اروپایی</text>
  
  <!-- Part 4 -->
  <rect x="60" y="575" width="960" height="130" rx="12" fill="#A855F7" fill-opacity="0.2" stroke="#A855F7" stroke-width="2"/>
  <text x="980" y="615" font-family="Vazirmatn, Tahoma" font-size="30" fill="#C084FC" text-anchor="end" direction="rtl" font-weight="bold">بخش : جهان</text>
  <text x="980" y="655" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل : استعمار و پسااستعمار</text>
  <text x="980" y="690" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل : مداخلات معاصر (عراق لیبی سوریه...)</text>
  
  <!-- Part 5 -->
  <rect x="60" y="720" width="960" height="130" rx="12" fill="#EC4899" fill-opacity="0.2" stroke="#EC4899" stroke-width="2"/>
  <text x="980" y="760" font-family="Vazirmatn, Tahoma" font-size="30" fill="#EC4899" text-anchor="end" direction="rtl" font-weight="bold">بخش : تحلیل عمیق</text>
  <text x="980" y="800" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل : روانشناسی اجتماعی</text>
  <text x="980" y="835" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">فصل -: جامعهشناسی و ایدئولوژی</text>
  
  <!-- Part 6 -->
  <rect x="60" y="865" width="960" height="90" rx="12" fill="#00D9FF" fill-opacity="0.2" stroke="#00D9FF" stroke-width="2"/>
  <text x="980" y="905" font-family="Vazirmatn, Tahoma" font-size="30" fill="#00D9FF" text-anchor="end" direction="rtl" font-weight="bold">بخش : نتیجهگیری</text>
  <text x="980" y="940" font-family="Vazirmatn, Tahoma" font-size="24" fill="#94A3B8" text-anchor="end" direction="rtl">فصل : جمعبندی و چشمانداز</text>
  
  <!-- Appendices -->
  <rect x="60" y="970" width="960" height="130" rx="12" fill="#64748B" fill-opacity="0.2" stroke="#64748B" stroke-width="2"/>
  <text x="980" y="1010" font-family="Vazirmatn, Tahoma" font-size="30" fill="#94A3B8" text-anchor="end" direction="rtl" font-weight="bold"> پیوستها</text>
  <text x="980" y="1050" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">الف: خلاصهی مدیریتی | ب: نقد نقادانه</text>
  <text x="980" y="1085" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">پ: ایران پس از  | ت: جدول تطبیقی</text>
  
  <!-- Total stats -->
  <rect x="200" y="1130" width="680" height="80" rx="15" fill="#1A237E" stroke="#F9A825" stroke-width="2"/>
  <text x="540" y="1180" font-family="Vazirmatn, Tahoma" font-size="32" fill="#FFFFFF" text-anchor="middle" direction="rtl"> مجموع:  فصل +  پیوست = بیش از  صفحه</text>
  
  <!-- CTA -->
  <rect x="300" y="1230" width="480" height="60" rx="30" fill="url(#titleGrad)"/>
  <text x="540" y="1272" font-family="Vazirmatn, Tahoma" font-size="28" fill="#0D1117" text-anchor="middle" direction="rtl" font-weight="bold">شروع مطالعه </text>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
