<svg width="1080" height="1350" viewBox="0 0 1080 1350"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .bg { fill:#0a0a1a; }
      .header-bar { fill:#1A237E; }
      .accent { fill:#F9A825; }
      .card { fill:#111428; stroke:#2a2f4a; stroke-width:1.4; }
      .vs-card-l { fill:#0d1a10; stroke:#2E7D32; stroke-width:2; }
      .vs-card-r { fill:#1a0d0d; stroke:#C62828; stroke-width:2; }
      .shadow { filter:drop-shadow(0px 16px 36px rgba(0,0,0,0.45)); }

      .title      { font-size:46px; font-weight:800; fill:#FFFFFF; }
      .subtitle   { font-size:26px; fill:#CFD8DC; }
      .card-title { font-size:30px; font-weight:700; fill:#FFFFFF; }
      .card-text  { font-size:25px; fill:#ECEFF1; }
      .gold       { fill:#F9A825; font-weight:700; }
      .green      { fill:#69F0AE; font-weight:700; }
      .red        { fill:#EF5350; font-weight:700; }
      .footer     { font-size:24px; fill:#78909C; }
      .vs         { font-size:48px; font-weight:900; fill:#F9A825; }

      text { font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="1080" height="1350"/>

  <!-- header bar -->
  <rect class="header-bar" x="60" y="60" width="960" height="90" rx="22" ry="22"/>
  <rect class="accent" x="80" y="82" width="10" height="46" rx="5" ry="5"/>

  <!-- header text -->
  <text x="1000" y="115" text-anchor="end" class="subtitle">
    <tspan x="1000" class="subtitle">نظریه‌ی هویت اجتماعی</tspan>
    <tspan x="450" dy="00" class="subtitle" fill="#B0BEC5">فصل ۱۱ • روان‌شناسی نجات‌طلبی</tspan>
  </text>

  <!-- main title -->
  <text x="1000" y="220" text-anchor="end" class="title">
    <tspan x="1000">مرز </tspan>
    <tspan class="green">خودی</tspan>
    <tspan> و </tspan>
    <tspan class="red">بیگانه</tspan>
    <tspan>: کجا خط می‌کشیم؟</tspan>
  </text>

  <!-- subtitle paragraph -->
  <text x="1000" y="265" text-anchor="start" class="subtitle" direction="rtl">
    <tspan x="1000">نظریه‌ی تاجفل و ترنر: انسان‌ها هویتشان را بر اساس عضویت در گروه‌ها تعریف می‌کنند</tspan>
    <tspan x="1000" dy="30">و <tspan class="gold">مرز خودی/بیگانه</tspan> سیال است.</tspan>
  </text>

  <!-- left vs card -->
  <rect class="vs-card-l shadow" x="80" y="320" width="440" height="380" rx="24" ry="24"/>
  <text x="490" y="360" text-anchor="start" class="card-title" direction="rtl">
    <tspan class="green">درون‌گروه (خودی)</tspan>
  </text>
  <text x="495" y="395" text-anchor="start" class="card-text" direction="rtl">
    <tspan x="495">• «ما» ایرانی‌ها، عراقی‌ها، سوری‌ها…</tspan>
    <tspan x="495" dy="40">• در بحران، مرز «ما» تنگ‌تر می‌شود:</tspan>
    <tspan x="495" dy="40">فقط هم‌قومِ من، هم‌مذهبِ من.</tspan>
    <tspan x="495" dy="40">• اپوزیسیونی که با «بیگانه» متحد می‌شود</tspan>
    <tspan x="495" dy="40">ممکن است از دایره‌ی «خودی» خارج شود.</tspan>
    <tspan x="495" dy="40">• یا برعکس: «بیگانه‌ی مفید» </tspan>
    <tspan x="495" dy="40">به «خودی» ارتقا پیدا کند.</tspan>
  </text>

  <!-- VS -->
  <text x="550" y="510" text-anchor="middle" class="vs">VS</text>

  <!-- right vs card -->
  <rect class="vs-card-r shadow" x="580" y="320" width="440" height="380" rx="24" ry="24"/>
  <text x="980" y="360" text-anchor="end" class="card-title">
    <tspan class="red">برون‌گروه (بیگانه)</tspan>
  </text>
  <text x="990" y="395" text-anchor="start" class="card-text" direction="rtl">
    <tspan x="990">• رژیم حاکم، قدرت خارجی، گروه رقیب…</tspan>
    <tspan x="990" dy="40">• نکته‌ی کلیدی: در نجات‌طلبی، مداخله‌گر </tspan>
    <tspan x="990" dy="40">خارجی <tspan class="gold">جابجایی هویت</tspan> انجام می‌دهد: </tspan>
   <tspan x="990" dy="40"> از «بیگانه» به «متحد» </tspan>
   <tspan x="990" dy="40">و حتی «نجات‌دهنده».</tspan>
    <tspan x="990" dy="40">• اما پس از مداخله، اغلب دوباره 
    <tspan x="990" dy="40"><tspan class="red">«اشغالگر»</tspan> تلقی می‌شود.</tspan></tspan>
  </text>

  <!-- insight card -->
  <rect class="card shadow" x="80" y="730" width="920" height="360" rx="28" ry="28"/>
  <text x="1000" y="775" text-anchor="end" class="card-title">
    پارادوکسِ هویتیِ نجات‌طلبی
  </text>
  <text x="1000" y="815" text-anchor="start" class="card-text" direction="rtl">
    <tspan x="950">۱. ملتی که از رژیم خود ناراضی است، <tspan class="gold">مرز خودی/بیگانه</tspan> را جابجا می‌کند:</tspan>
    <tspan x="950" dy="30">   رژیم = بیگانه، مداخله‌گر = نجات‌دهنده.</tspan>
    <tspan x="950" dy="34">۲. اما پس از مداخله، واقعیتِ «بیگانه بودنِ»
     مداخله‌گر آشکار می‌شود:</tspan>
    <tspan x="950" dy="30">   فرهنگ، زبان، منافع متفاوت.</tspan>
    <tspan x="950" dy="34">۳. نتیجه: <tspan class="red">بحران هویت مضاعف</tspan> — نه رژیم قبلی قابل بازگشت است</tspan>
    <tspan x="950" dy="30">   و نه مداخله‌گر قابل اعتماد.</tspan>
    <tspan x="950" dy="34">۴. فصل ۱۱ استدلال می‌کند: تنها راه خروج، بازسازی</tspan>
    <tspan x="950" dy="30"><tspan class="green">هویت ملیِ مستقل از هر دو</tspan> است.</tspan>
  </text>

  <!-- CTA -->
  <rect class="card shadow" x="80" y="1120" width="920" height="100" rx="24" ry="24"/>
  <text x="540" y="1180" text-anchor="middle" font-size="28" fill="#F9A825" font-weight="700">
    📖 برای جدول کامل سوگیری‌ها و نمودار ذهنی TikZ → متن کامل فصل ۱۱
  </text>

  <!-- footer -->
  <text x="1000" y="1255" text-anchor="end" class="footer">
    <tspan x="1000">nations_salvation@ • لینک مطالعه در بیو</tspan>
  </text>
  <text x="80" y="1255" text-anchor="start" class="footer">
    اسلاید ۶ از ۶
  </text>

</svg>
