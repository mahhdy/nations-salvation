<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { direction:rtl; font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif; }
      .bg { fill:#0a0a1a; }
      .header-bar { fill:#1A237E; }
      .accent { fill:#F9A825; }
      .card { fill:#111428; stroke:#2a2f4a; stroke-width:1.4; rx:28; ry:28; }
      .trauma-card { fill:#1a0f20; stroke:#CE93D8; stroke-width:1.6; rx:24; ry:24; }
      .shadow { filter:drop-shadow(0px 16px 36px rgba(0,0,0,0.45)); }
      .title { font-size:46px; font-weight:800; color:#FFFFFF; }
      .subtitle { font-size:26px; color:#CFD8DC; line-height:1.6; }
      .card-title { font-size:30px; font-weight:700; color:#FFFFFF; }
      .card-text { font-size:25px; line-height:1.7; color:#ECEFF1; }
      .gold { color:#F9A825; font-weight:700; }
      .purple { color:#CE93D8; font-weight:700; }
      .red { color:#EF5350; font-weight:700; }
      .stat { font-size:56px; font-weight:900; color:#CE93D8; }
      .stat-label { font-size:22px; color:#B0BEC5; }
      .footer { font-size:24px; color:#78909C; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="1350"/>

  <rect class="header-bar" x="60" y="60" width="960" height="90" rx="22"/>
  <rect class="accent" x="80" y="82" width="10" height="46" rx="5"/>
  <foreignObject x="110" y="70" width="900" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;align-items:center;color:#FFF;font-size:28px;font-weight:600;">
      <span>تروما و هویت قربانی</span>
      <span style="opacity:0.8;">فصل ۱۱ • روان‌شناسی نجات‌طلبی</span>
    </div>
  </foreignObject>

  <foreignObject x="80" y="180" width="920" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="title">وقتی <span class="purple">زخم جمعی</span> به ابزار سیاسی تبدیل می‌شود</div>
      <div class="subtitle" style="margin-top:14px;">
        تروماهای تاریخی (جنگ، نسل‌کشی، اشغال) خاطره‌ی جمعی را
        شکل می‌دهند و ملت را آمادۀ پذیرش «هر نجات‌دهنده‌ای» می‌کنند.
      </div>
    </div>
  </foreignObject>

  <!-- Main card -->
  <rect class="card shadow" x="80" y="310" width="920" height="420"/>
  <foreignObject x="100" y="330" width="880" height="380">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="card-title">چرخه‌ی تروما → نجات‌طلبی</div>
      <div class="card-text" style="margin-top:18px;">
        <span class="purple">مرحله ۱:</span> رویداد تروماتیک (جنگ، کودتا، سرکوب وحشیانه)
        اعتماد ملت به توانایی خود را نابود می‌کند.<br/><br/>
        <span class="purple">مرحله ۲:</span> روایت «ما قربانی هستیم» هویت غالب می‌شود.
        در این روایت، <span class="gold">عاملیت (Agency)</span> از ملت سلب شده
        و به «دشمن خارجی» یا «رژیم داخلی» واگذار می‌شود.<br/><br/>
        <span class="purple">مرحله ۳:</span> نخبگان فرصت‌طلب (داخلی یا خارجی) از
        این «حسِ قربانی بودن» بهره‌برداری می‌کنند و خود را
        <span class="gold">نجات‌دهنده</span> معرفی می‌کنند.<br/><br/>
        <span class="purple">مرحله ۴:</span> ملت به جای <span class="gold">بازسازی عاملیت</span>
        خود، در انتظار معجزه‌ی بیرونی می‌ماند.
      </div>
    </div>
  </foreignObject>

  <!-- Trauma stats -->
  <rect class="trauma-card shadow" x="80" y="760" width="290" height="240"/>
  <foreignObject x="100" y="780" width="250" height="200">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div class="stat">PTSD</div>
      <div class="stat-label" style="margin-top:10px;">
        اختلال استرس پس از سانحه در سطح <span class="gold">ملی</span>:
        پدیده‌ای مستند در جوامع جنگ‌زده
      </div>
    </div>
  </foreignObject>

  <rect class="trauma-card shadow" x="395" y="760" width="290" height="240"/>
  <foreignObject x="415" y="780" width="250" height="200">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div class="stat">نسل‌ها</div>
      <div class="stat-label" style="margin-top:10px;">
        تروما <span class="purple">بین‌نسلی</span> منتقل می‌شود:
        فرزندان و نوه‌ها نیز آسیب‌پذیرند
      </div>
    </div>
  </foreignObject>

  <rect class="trauma-card shadow" x="710" y="760" width="290" height="240"/>
  <foreignObject x="730" y="780" width="250" height="200">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div class="stat">۸۰٪</div>
      <div class="stat-label" style="margin-top:10px;">
        در برخی نظرسنجی‌ها، بیش از ۸۰٪ مردم کشورهای جنگ‌زده
        <span class="red">«ناامیدی از آینده»</span> را گزارش کرده‌اند
      </div>
    </div>
  </foreignObject>

  <!-- Bottom insight -->
  <rect class="card shadow" x="80" y="1040" width="920" height="160"/>
  <foreignObject x="100" y="1055" width="880" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div style="font-size:30px;color:#CE93D8;font-weight:800;">💭 پرسش برای تأمل</div>
      <div class="card-text" style="margin-top:10px;">
        آیا ملتی که در حال تجربه‌ی تروماست، اصلاً توانایی <span class="gold">تصمیم‌گیری عقلانی</span>
        درباره‌ی دعوت از مداخله‌گر خارجی را دارد؟
      </div>
    </div>
  </foreignObject>

  <foreignObject x="80" y="1250" width="920" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" class="footer"
         style="display:flex;justify-content:space-between;align-items:center;">
      <span>nations_salvation@ • لینک مطالعه در بیو</span>
      <span>اسلاید ۴ از ۶</span>
    </div>
  </foreignObject>
</svg>
