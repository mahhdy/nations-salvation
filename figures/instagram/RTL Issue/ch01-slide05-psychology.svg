<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <style>
    text { 
      direction: rtl; 
      unicode-bidi: bidi-override;
    }
    .rtl-text {
      direction: rtl;
      unicode-bidi: embed;
      text-anchor: end;
    }
  </style>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#1A237E"/>
  <text x="850" y="65" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl">فصل ۱ • اسلاید ۵ از ۱۰</text>
  
  <!-- Title -->
  <text x="540" y="150" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" direction="rtl">چرا نجات‌طلبی جذاب است؟</text>
  <text x="540" y="210" font-family="Vazirmatn, Tahoma" font-size="30" fill="#94A3B8" text-anchor="middle" direction="rtl">روان‌شناسی پشت امید به بیگانه</text>
  
  <!-- Brain icon placeholder -->
  <circle cx="540" cy="310" r="60" fill="none" stroke="#A855F7" stroke-width="3"/>
  <text x="540" y="325" font-family="Vazirmatn, Tahoma" font-size="48" fill="#A855F7" text-anchor="middle">🧠</text>
  
  <!-- Reason 1 -->
  <rect x="60" y="400" width="960" height="130" rx="15" fill="#1A237E" fill-opacity="0.4" stroke="#00D9FF" stroke-width="2"/>
  <text x="970" y="450" font-family="Vazirmatn, Tahoma" font-size="40" fill="#F9A825" text-anchor="end" font-weight="bold">۱</text>
  <text x="920" y="450" font-family="Vazirmatn, Tahoma" font-size="34" fill="#00D9FF" text-anchor="end" direction="rtl" font-weight="bold">ناامیدی آموخته‌شده</text>
  <text x="920" y="505" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF" text-anchor="end" direction="rtl">وقتی تلاش‌های داخلی مکرراً شکست می‌خورند،</text>
  <text x="920" y="540" font-family="Vazirmatn, Tahoma" font-size="26" fill="#94A3B8" text-anchor="end" direction="rtl">ذهن به دنبال «نجات‌دهنده‌ی بیرونی» می‌گردد.</text>
  
  <!-- Reason 2 -->
  <rect x="60" y="550" width="960" height="130" rx="15" fill="#1A237E" fill-opacity="0.4" stroke="#F9A825" stroke-width="2"/>
  <text x="970" y="600" font-family="Vazirmatn, Tahoma" font-size="40" fill="#F9A825" text-anchor="end" font-weight="bold">۲</text>
  <text x="920" y="600" font-family="Vazirmatn, Tahoma" font-size="34" fill="#F9A825" text-anchor="end" direction="rtl" font-weight="bold">آرزواندیشی (Wishful Thinking)</text>
  <text x="920" y="655" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF" text-anchor="end" direction="rtl">باور به اینکه «این بار فرق دارد» —</text>
  <text x="920" y="690" font-family="Vazirmatn, Tahoma" font-size="26" fill="#94A3B8" text-anchor="end" direction="rtl">بدون شواهد واقعی.</text>
  
  <!-- Reason 3 -->
  <rect x="60" y="700" width="960" height="130" rx="15" fill="#1A237E" fill-opacity="0.4" stroke="#2E7D32" stroke-width="2"/>
  <text x="970" y="750" font-family="Vazirmatn, Tahoma" font-size="40" fill="#F9A825" text-anchor="end" font-weight="bold">۳</text>
  <text x="920" y="750" font-family="Vazirmatn, Tahoma" font-size="34" fill="#4ADE80" text-anchor="end" direction="rtl" font-weight="bold">روان‌شناسی قربانی</text>
  <text x="920" y="805" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF" text-anchor="end" direction="rtl">«ما قربانی هستیم، پس حق داریم کمک بگیریم» —</text>
  <text x="920" y="840" font-family="Vazirmatn, Tahoma" font-size="26" fill="#94A3B8" text-anchor="end" direction="rtl">بدون توجه به عواقب.</text>
  
  <!-- Reason 4 -->
  <rect x="60" y="850" width="960" height="130" rx="15" fill="#1A237E" fill-opacity="0.4" stroke="#EC4899" stroke-width="2"/>
  <text x="970" y="900" font-family="Vazirmatn, Tahoma" font-size="40" fill="#F9A825" text-anchor="end" font-weight="bold">۴</text>
  <text x="920" y="900" font-family="Vazirmatn, Tahoma" font-size="34" fill="#EC4899" text-anchor="end" direction="rtl" font-weight="bold">وعده‌های فریبنده</text>
  <text x="920" y="955" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF" text-anchor="end" direction="rtl">مداخله‌گران همیشه آزادی، دموکراسی و رفاه قول می‌دهند —</text>
  <text x="920" y="990" font-family="Vazirmatn, Tahoma" font-size="26" fill="#94A3B8" text-anchor="end" direction="rtl">اما منافع خود را دنبال می‌کنند.</text>
  
  <!-- Quote box -->
  <rect x="100" y="1020" width="880" height="120" rx="20" fill="none" stroke="#A855F7" stroke-width="2"/>
  <text x="540" y="1065" font-family="Vazirmatn, Tahoma" font-size="28" fill="#A855F7" text-anchor="middle" direction="rtl" font-style="italic">«کسی که از بیگانه آزادی می‌خواهد،</text>
  <text x="540" y="1105" font-family="Vazirmatn, Tahoma" font-size="28" fill="#A855F7" text-anchor="middle" direction="rtl" font-style="italic">بردگی جدیدی می‌خرد.»</text>
  <text x="540" y="1140" font-family="Vazirmatn, Tahoma" font-size="22" fill="#94A3B8" text-anchor="middle" direction="rtl">— جان استوارت میل (تفسیر آزاد)</text>
  
  <!-- CTA -->
  <rect x="300" y="1200" width="480" height="70" rx="35" fill="url(#titleGrad)"/>
  <text x="540" y="1248" font-family="Vazirmatn, Tahoma" font-size="30" fill="#0D1117" text-anchor="middle" direction="rtl" font-weight="bold">مطالعه‌ی کامل: فصل ۱۱ ←</text>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
