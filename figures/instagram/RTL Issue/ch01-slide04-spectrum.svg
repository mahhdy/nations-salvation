<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <style>
    text { 
      direction: rtl; 
      unicode-bidi: bidi-override;
    }
    .rtl-text {
      direction: rtl;
      unicode-bidi: embed;
      text-anchor: end;
    }
  </style>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="50%" style="stop-color:#F9A825"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#1A237E"/>
  <text x="850" y="65" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl">فصل ۱ • اسلاید ۴ از ۱۰</text>
  
  <!-- Title -->
  <text x="540" y="150" font-family="Vazirmatn, Tahoma" font-size="56" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" direction="rtl">طیف نتایج مداخله</text>
  <text x="540" y="200" font-family="Vazirmatn, Tahoma" font-size="28" fill="#94A3B8" text-anchor="middle" direction="rtl">از بهترین تا بدترین سناریو</text>
  
  <!-- Spectrum bar -->
  <rect x="80" y="240" width="920" height="30" rx="15" fill="url(#spectrumGrad)"/>
  <text x="120" y="300" font-family="Vazirmatn, Tahoma" font-size="22" fill="#22C55E" text-anchor="middle">بهترین</text>
  <text x="960" y="300" font-family="Vazirmatn, Tahoma" font-size="22" fill="#DC2626" text-anchor="middle">بدترین</text>
  
  <!-- Level A -->
  <rect x="60" y="330" width="960" height="110" rx="12" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <circle cx="970" cy="385" r="35" fill="#22C55E"/>
  <text x="970" y="395" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="bold">A</text>
  <text x="900" y="375" font-family="Vazirmatn, Tahoma" font-size="32" fill="#22C55E" text-anchor="end" direction="rtl" font-weight="bold">رهایی کامل</text>
  <text x="900" y="415" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">استقلال پایدار + دموکراسی + رشد اقتصادی</text>
  
  <!-- Level B -->
  <rect x="60" y="455" width="960" height="110" rx="12" fill="#84CC16" fill-opacity="0.15" stroke="#84CC16" stroke-width="2"/>
  <circle cx="970" cy="510" r="35" fill="#84CC16"/>
  <text x="970" y="520" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="bold">B</text>
  <text x="900" y="500" font-family="Vazirmatn, Tahoma" font-size="32" fill="#84CC16" text-anchor="end" direction="rtl" font-weight="bold">رهایی با وابستگی محدود</text>
  <text x="900" y="540" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">استقلال نسبی + برخی تعهدات به مداخله‌گر</text>
  
  <!-- Level C -->
  <rect x="60" y="580" width="960" height="110" rx="12" fill="#F9A825" fill-opacity="0.15" stroke="#F9A825" stroke-width="2"/>
  <circle cx="970" cy="635" r="35" fill="#F9A825"/>
  <text x="970" y="645" font-family="Vazirmatn, Tahoma" font-size="36" fill="#0D1117" text-anchor="middle" font-weight="bold">C</text>
  <text x="900" y="625" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F9A825" text-anchor="end" direction="rtl" font-weight="bold">تغییر رژیم + بی‌ثباتی</text>
  <text x="900" y="665" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">حکومت جدید اما ناپایدار و ضعیف</text>
  
  <!-- Level D -->
  <rect x="60" y="705" width="960" height="110" rx="12" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="2"/>
  <circle cx="970" cy="760" r="35" fill="#F97316"/>
  <text x="970" y="770" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="bold">D</text>
  <text x="900" y="750" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F97316" text-anchor="end" direction="rtl" font-weight="bold">رژیم دست‌نشانده</text>
  <text x="900" y="790" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">وابستگی ساختاری کامل به مداخله‌گر</text>
  
  <!-- Level E -->
  <rect x="60" y="830" width="960" height="110" rx="12" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="2"/>
  <circle cx="970" cy="885" r="35" fill="#EF4444"/>
  <text x="970" y="895" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="bold">E</text>
  <text x="900" y="875" font-family="Vazirmatn, Tahoma" font-size="32" fill="#EF4444" text-anchor="end" direction="rtl" font-weight="bold">هرج‌ومرج</text>
  <text x="900" y="915" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">دولت شکست‌خورده، جنگ داخلی</text>
  
  <!-- Level F -->
  <rect x="60" y="955" width="960" height="110" rx="12" fill="#991B1B" fill-opacity="0.15" stroke="#991B1B" stroke-width="2"/>
  <circle cx="970" cy="1010" r="35" fill="#991B1B"/>
  <text x="970" y="1020" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="bold">F</text>
  <text x="900" y="1000" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F87171" text-anchor="end" direction="rtl" font-weight="bold">استعمار یا الحاق</text>
  <text x="900" y="1040" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="end" direction="rtl">از دست دادن کامل حاکمیت</text>
  
  <!-- Key stat -->
  <rect x="200" y="1100" width="680" height="100" rx="15" fill="#1A237E" stroke="#F9A825" stroke-width="2"/>
  <text x="540" y="1145" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF" text-anchor="middle" direction="rtl">🔍 یافته‌ی اصلی: در ۳۰ مورد بررسی‌شده</text>
  <text x="540" y="1185" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F9A825" text-anchor="middle" direction="rtl" font-weight="bold">بیش از ۷۰٪ در سطح C تا F قرار دارند</text>
  
  <!-- Navigation -->
  <text x="540" y="1270" font-family="Vazirmatn, Tahoma" font-size="26" fill="#00D9FF" text-anchor="middle" direction="rtl">اسلاید بعدی: چرا نجات‌طلبی جذاب است؟ ←</text>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
