<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <style>
    text { 
      direction: rtl; 
      unicode-bidi: bidi-override;
    }
    .rtl-text {
      direction: rtl;
      unicode-bidi: embed;
      text-anchor: end;
    }
  </style>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="unBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#009EDB"/>
      <stop offset="100%" style="stop-color:#4FC3F7"/>
    </linearGradient>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#009EDB"/>
  <text x="850" y="65" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl">فصل ۲ • اسلاید ۳ از ۸</text>
  
  <!-- UN Logo placeholder -->
  <circle cx="540" cy="180" r="70" fill="none" stroke="#009EDB" stroke-width="3"/>
  <text x="540" y="200" font-family="Vazirmatn, Tahoma" font-size="50" fill="#009EDB" text-anchor="middle">🌐</text>
  
  <!-- Title -->
  <text x="540" y="310" font-family="Vazirmatn, Tahoma" font-size="48" font-weight="bold" fill="url(#unBlue)" text-anchor="middle" direction="rtl">منشور سازمان ملل</text>
  <text x="540" y="370" font-family="Vazirmatn, Tahoma" font-size="40" fill="#F9A825" text-anchor="middle" direction="rtl" font-weight="bold">ماده ۲، بند ۴</text>
  
  <!-- Quote box -->
  <rect x="60" y="410" width="960" height="220" rx="20" fill="#009EDB" fill-opacity="0.1" stroke="#009EDB" stroke-width="3"/>
  <text x="540" y="470" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl" font-style="italic">«کلیه اعضا در روابط بین‌المللی خود</text>
  <text x="540" y="515" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl" font-style="italic">از تهدید به زور یا استفاده از آن</text>
  <text x="540" y="560" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl" font-style="italic">علیه تمامیت ارضی یا استقلال سیاسی</text>
  <text x="540" y="605" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF" text-anchor="middle" direction="rtl" font-style="italic">هر دولتی خودداری خواهند کرد.»</text>
  
  <!-- Exceptions -->
  <text x="540" y="690" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F9A825" text-anchor="middle" direction="rtl" font-weight="bold">استثناهای قانونی:</text>
  
  <!-- Exception 1 -->
  <rect x="555" y="730" width="465" height="130" rx="15" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <text x="787" y="780" font-family="Vazirmatn, Tahoma" font-size="28" fill="#4ADE80" text-anchor="middle" direction="rtl" font-weight="bold">۱. دفاع مشروع (ماده ۵۱)</text>
  <text x="787" y="825" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="middle" direction="rtl">در صورت حمله‌ی مسلحانه</text>
  <text x="787" y="855" font-family="Vazirmatn, Tahoma" font-size="22" fill="#94A3B8" text-anchor="middle" direction="rtl">تا تصمیم شورای امنیت</text>
  
  <!-- Exception 2 -->
  <rect x="60" y="730" width="465" height="130" rx="15" fill="#009EDB" fill-opacity="0.15" stroke="#009EDB" stroke-width="2"/>
  <text x="292" y="780" font-family="Vazirmatn, Tahoma" font-size="28" fill="#4FC3F7" text-anchor="middle" direction="rtl" font-weight="bold">۲. مجوز شورای امنیت</text>
  <text x="292" y="825" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF" text-anchor="middle" direction="rtl">فصل هفتم منشور</text>
  <text x="292" y="855" font-family="Vazirmatn, Tahoma" font-size="22" fill="#94A3B8" text-anchor="middle" direction="rtl">تهدید علیه صلح جهانی</text>
  
  <!-- Problem box -->
  <rect x="80" y="890" width="920" height="180" rx="20" fill="#DC2626" fill-opacity="0.1" stroke="#DC2626" stroke-width="2"/>
  <text x="540" y="945" font-family="Vazirmatn, Tahoma" font-size="30" fill="#DC2626" text-anchor="middle" direction="rtl" font-weight="bold">🔴 مشکل اصلی:</text>
  <text x="540" y="1000" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF" text-anchor="middle" direction="rtl">۵ عضو دائم شورای امنیت حق وتو دارند.</text>
  <text x="540" y="1050" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F87171" text-anchor="middle" direction="rtl">روسیه، چین، آمریکا، فرانسه، بریتانیا</text>
  
  <!-- Stat -->
  <rect x="200" y="1100" width="680" height="100" rx="15" fill="#1A237E" stroke="#F9A825" stroke-width="2"/>
  <text x="540" y="1145" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F9A825" text-anchor="middle" direction="rtl" font-weight="bold">📊 آمار: از ۱۹۴۵ تا ۲۰۲۳</text>
  <text x="540" y="1185" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF" text-anchor="middle" direction="rtl">بیش از ۳۰۰ بار از حق وتو استفاده شده است.</text>
  
  <text x="540" y="1270" font-family="Vazirmatn, Tahoma" font-size="26" fill="#00D9FF" text-anchor="middle" direction="rtl">بعدی: مسئولیت حمایت (R2P) ←</text>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
