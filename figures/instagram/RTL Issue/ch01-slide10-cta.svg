<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <style>
    text { 
      direction: rtl; 
      unicode-bidi: bidi-override;
    }
    .rtl-text {
      direction: rtl;
      unicode-bidi: embed;
      text-anchor: end;
    }
  </style>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F9A825"/>
      <stop offset="100%" style="stop-color:#FFD54F"/>
    </linearGradient>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#F9A825"/>
  <text x="850" y="65" font-family="Vazirmatn, Tahoma" font-size="28" fill="#0D1117" text-anchor="middle" direction="rtl" font-weight="bold">فصل ۱ • اسلاید ۱۰ از ۱۰</text>
  
  <!-- Title -->
  <text x="540" y="150" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" direction="rtl">این کتاب برای کیست؟</text>
  
  <!-- Target 1 -->
  <rect x="60" y="200" width="960" height="100" rx="15" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <text x="100" y="260" font-family="Vazirmatn, Tahoma" font-size="36" fill="#22C55E" text-anchor="start">✓</text>
  <text x="940" y="260" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF" text-anchor="end" direction="rtl">فعالان سیاسی و مدنی که به دنبال تغییرند</text>
  
  <!-- Target 2 -->
  <rect x="60" y="315" width="960" height="100" rx="15" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <text x="100" y="375" font-family="Vazirmatn, Tahoma" font-size="36" fill="#22C55E" text-anchor="start">✓</text>
  <text x="940" y="375" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF" text-anchor="end" direction="rtl">دانشجویان علوم سیاسی و روابط بین‌الملل</text>
  
  <!-- Target 3 -->
  <rect x="60" y="430" width="960" height="100" rx="15" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <text x="100" y="490" font-family="Vazirmatn, Tahoma" font-size="36" fill="#22C55E" text-anchor="start">✓</text>
  <text x="940" y="490" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF" text-anchor="end" direction="rtl">علاقه‌مندان به تاریخ ایران و جهان</text>
  
  <!-- Target 4 -->
  <rect x="60" y="545" width="960" height="100" rx="15" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <text x="100" y="605" font-family="Vazirmatn, Tahoma" font-size="36" fill="#22C55E" text-anchor="start">✓</text>
  <text x="940" y="605" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF" text-anchor="end" direction="rtl">روزنامه‌نگاران و تحلیل‌گران سیاسی</text>
  
  <!-- Target 5 -->
  <rect x="60" y="660" width="960" height="100" rx="15" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <text x="100" y="720" font-family="Vazirmatn, Tahoma" font-size="36" fill="#22C55E" text-anchor="start">✓</text>
  <text x="940" y="720" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF" text-anchor="end" direction="rtl">هرکسی که می‌خواهد واقع‌بینانه فکر کند</text>
  
  <!-- Not for -->
  <rect x="60" y="790" width="960" height="80" rx="15" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-width="2"/>
  <text x="100" y="840" font-family="Vazirmatn, Tahoma" font-size="36" fill="#DC2626" text-anchor="start">✗</text>
  <text x="940" y="840" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F87171" text-anchor="end" direction="rtl">کسانی که فقط دنبال تأیید باورهای قبلی هستند</text>
  
  <!-- Quote -->
  <rect x="100" y="900" width="880" height="130" rx="20" fill="#1A237E" stroke="#A855F7" stroke-width="2"/>
  <text x="540" y="950" font-family="Vazirmatn, Tahoma" font-size="28" fill="#A855F7" text-anchor="middle" direction="rtl" font-style="italic">«هدف این کتاب نه امیدزدایی است،»</text>
  <text x="540" y="995" font-family="Vazirmatn, Tahoma" font-size="28" fill="#A855F7" text-anchor="middle" direction="rtl" font-style="italic">«نه توجیه استبداد — بلکه واقع‌بینی.»</text>
  <text x="540" y="1030" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F9A825" text-anchor="middle" direction="rtl">— مهدی سالم، نویسنده</text>
  
  <!-- CTA Box -->
  <rect x="120" y="1060" width="840" height="160" rx="25" fill="url(#ctaGrad)"/>
  <text x="540" y="1115" font-family="Vazirmatn, Tahoma" font-size="36" fill="#0D1117" text-anchor="middle" direction="rtl" font-weight="bold">📖 مطالعه‌ی کامل کتاب</text>
  <text x="540" y="1165" font-family="Vazirmatn, Tahoma" font-size="28" fill="#0D1117" text-anchor="middle" direction="rtl">لینک در بیو | @nations_salvation</text>
  <text x="540" y="1205" font-family="Vazirmatn, Tahoma" font-size="24" fill="#1A237E" text-anchor="middle" direction="rtl">دانلود رایگان PDF</text>
  
  <!-- Social Share -->
  <text x="540" y="1270" font-family="Vazirmatn, Tahoma" font-size="28" fill="#00D9FF" text-anchor="middle" direction="rtl">اشتراک‌گذاری کنید 🔄 | ذخیره کنید 🔖</text>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
