<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <style>
      .rtl { direction: rtl; text-align: center; font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif; }
      .rtl-right { direction: rtl; text-align: right; font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif; padding-right: 15px; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#F9A825"/>
  <foreignObject x="660" y="30" width="380" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#0D1117; font-size:28px; font-weight:bold; line-height:50px;">فصل   خلاصه</div>
  </foreignObject>
  
  <!-- Title -->
  <foreignObject x="40" y="100" width="1000" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="font-size:52px; font-weight:bold; color:#00D9FF;"> خلاصهی فصل </div>
  </foreignObject>
  
  <!-- Summary box -->
  <rect x="60" y="180" width="960" height="550" rx="20" fill="#1A237E" fill-opacity="0.3" stroke="#1A237E" stroke-width="2"/>
  
  <!-- Point 1 -->
  <foreignObject x="80" y="205" width="920" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#00D9FF; font-size:28px; font-weight:bold;"> اصل وستفالیایی:</div>
  </foreignObject>
  <foreignObject x="80" y="245" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;">حاکمیت ملی بنیان نظام بینالملل است.</div>
  </foreignObject>
  
  <!-- Point 2 -->
  <foreignObject x="80" y="295" width="920" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#4ADE80; font-size:28px; font-weight:bold;"> منشور ملل متحد:</div>
  </foreignObject>
  <foreignObject x="80" y="335" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;">ممنوعیت زور اما با استثناهایی.</div>
  </foreignObject>
  
  <!-- Point 3 -->
  <foreignObject x="80" y="385" width="920" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F9A825; font-size:28px; font-weight:bold;"> مسئولیت حمایت (R2P):</div>
  </foreignObject>
  <foreignObject x="80" y="425" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;">ایدهی جذاب اجرای مشکلدار و گزینشی.</div>
  </foreignObject>
  
  <!-- Point 4 -->
  <foreignObject x="80" y="475" width="920" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#C084FC; font-size:28px; font-weight:bold;"> دکترینهای توجیهگر:</div>
  </foreignObject>
  <foreignObject x="80" y="515" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;">هر قدرت توجیهی برای مداخلهی خود دارد.</div>
  </foreignObject>
  
  <!-- Point 5 -->
  <foreignObject x="80" y="565" width="920" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:28px; font-weight:bold;"> واقعیت تلخ:</div>
  </foreignObject>
  <foreignObject x="80" y="605" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;">قانون بدون ضمانت اجرا = ابزار قدرت.</div>
  </foreignObject>
  
  <!-- Point 6 -->
  <foreignObject x="80" y="655" width="920" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#EC4899; font-size:28px; font-weight:bold;"> پرسشهای حلنشده:</div>
  </foreignObject>
  <foreignObject x="80" y="695" width="920" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:24px;">حقوق بینالملل پاسخ روشنی ندارد.</div>
  </foreignObject>
  
  <!-- Key takeaway -->
  <rect x="100" y="760" width="880" height="110" rx="20" fill="none" stroke="#EC4899" stroke-width="3"/>
  <foreignObject x="100" y="780" width="880" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#EC4899; font-size:30px; font-weight:bold;"> درس اصلی:</div>
  </foreignObject>
  <foreignObject x="100" y="820" width="880" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#FFFFFF; font-size:26px;">قبل از درخواست مداخله بدانید قانون حمایت نمیکند.</div>
  </foreignObject>
  
  <!-- Next chapter preview -->
  <rect x="100" y="900" width="880" height="140" rx="20" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <foreignObject x="100" y="920" width="880" height="45">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#4ADE80; font-size:32px; font-weight:bold;"> فصل بعدی:</div>
  </foreignObject>
  <foreignObject x="100" y="965" width="880" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#FFFFFF; font-size:28px;">مدلهای تحلیلی</div>
  </foreignObject>
  <foreignObject x="100" y="1005" width="880" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#94A3B8; font-size:24px;">چگونه مداخله را علمی تحلیل کنیم</div>
  </foreignObject>
  
  <!-- CTA -->
  <rect x="300" y="1070" width="480" height="65" rx="32" fill="url(#titleGrad)"/>
  <foreignObject x="300" y="1070" width="480" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#0D1117; font-size:28px; font-weight:bold; line-height:65px;">ذخیره کنید  | ادامه </div>
  </foreignObject>
  
  <foreignObject x="40" y="1160" width="1000" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#94A3B8; font-size:22px;">@nations_salvation | لینک کتاب در بیو</div>
  </foreignObject>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
