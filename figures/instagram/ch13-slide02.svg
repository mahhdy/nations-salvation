<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { direction:rtl; font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif; }
      .bg { fill:#0c0812; }
      .header-bar { fill:#1A237E; }
      .accent { fill:#F9A825; }
      .row-even { fill:#12101e; }
      .row-odd { fill:#1a1530; }
      .row-header { fill:#311B92; }
      .card { fill:#12101e; stroke:#311B92; stroke-width:1.4; rx:24; ry:24; }
      .shadow { filter:drop-shadow(0px 12px 28px rgba(0,0,0,0.4)); }
      .title { font-size:42px; font-weight:800; color:#FFFFFF; }
      .th { font-size:21px; font-weight:700; color:#F9A825; }
      .td { font-size:20px; color:#ECEFF1; line-height:1.4; }
      .gold { color:#F9A825; font-weight:700; }
      .pink { color:#F48FB1; font-weight:700; }
      .red { color:#EF5350; font-weight:700; }
      .green { color:#69F0AE; font-weight:700; }
      .footer { font-size:24px; color:#78909C; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="1350"/>

  <rect class="header-bar" x="60" y="60" width="960" height="90" rx="22"/>
  <rect class="accent" x="80" y="82" width="10" height="46" rx="5"/>
  <foreignObject x="110" y="70" width="900" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;align-items:center;color:#FFF;font-size:28px;font-weight:600;">
      <span>جدول تطبیقی ایدئولوژی‌ها</span>
      <span style="opacity:0.8;">فصل ۱۳ • میسیونری و ایدئولوژی</span>
    </div>
  </foreignObject>

  <foreignObject x="80" y="168" width="920" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="title">مقایسه‌ی ۷ جریان ایدئولوژیک</div>
    </div>
  </foreignObject>

  <!-- Table header -->
  <rect class="row-header" x="60" y="248" width="960" height="55" rx="12"/>
  <foreignObject x="70" y="254" width="940" height="44">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;">
      <span class="th" style="width:170px;">ایدئولوژی</span>
      <span class="th" style="width:150px;">بازیگر</span>
      <span class="th" style="width:190px;">شعار نجات</span>
      <span class="th" style="width:180px;">نتیجه واقعی</span>
      <span class="th" style="width:80px;">طیف</span>
    </div>
  </foreignObject>

  <!-- Row 1 -->
  <rect class="row-odd" x="60" y="308" width="960" height="85" rx="6"/>
  <foreignObject x="70" y="314" width="940" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;align-items:center;">
      <span class="td" style="width:170px;"><span class="pink">میسیونری مسیحی</span></span>
      <span class="td" style="width:150px;">اروپای استعماری</span>
      <span class="td" style="width:190px;">رستگاری و تمدن</span>
      <span class="td" style="width:180px;">استعمار کامل</span>
      <span class="td" style="width:80px;"><span class="red">E–F</span></span>
    </div>
  </foreignObject>

  <!-- Row 2 -->
  <rect class="row-even" x="60" y="398" width="960" height="85" rx="6"/>
  <foreignObject x="70" y="404" width="940" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;align-items:center;">
      <span class="td" style="width:170px;"><span class="pink">صدور انقلاب ایران</span></span>
      <span class="td" style="width:150px;">ج.ا. ایران</span>
      <span class="td" style="width:190px;">آزادی مستضعفان</span>
      <span class="td" style="width:180px;">جنگ‌های نیابتی</span>
      <span class="td" style="width:80px;"><span class="red">C–D</span></span>
    </div>
  </foreignObject>

  <!-- Row 3 -->
  <rect class="row-odd" x="60" y="488" width="960" height="85" rx="6"/>
  <foreignObject x="70" y="494" width="940" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;align-items:center;">
      <span class="td" style="width:170px;"><span class="pink">پان‌اسلاویسم</span></span>
      <span class="td" style="width:150px;">روسیه تزاری</span>
      <span class="td" style="width:190px;">حمایت اسلاوها</span>
      <span class="td" style="width:180px;">جنگ جهانی اول</span>
      <span class="td" style="width:80px;"><span class="red">D–E</span></span>
    </div>
  </foreignObject>

  <!-- Row 4 -->
  <rect class="row-even" x="60" y="578" width="960" height="85" rx="6"/>
  <foreignObject x="70" y="584" width="940" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;align-items:center;">
      <span class="td" style="width:170px;"><span class="pink">پان‌ترکیسم</span></span>
      <span class="td" style="width:150px;">عثمانی/ترکیه</span>
      <span class="td" style="width:190px;">وحدت ترکان</span>
      <span class="td" style="width:180px;">تنش منطقه‌ای</span>
      <span class="td" style="width:80px;"><span class="gold">C</span></span>
    </div>
  </foreignObject>

  <!-- Row 5 -->
  <rect class="row-odd" x="60" y="668" width="960" height="85" rx="6"/>
  <foreignObject x="70" y="674" width="940" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;align-items:center;">
      <span class="td" style="width:170px;"><span class="pink">پان‌عربیسم</span></span>
      <span class="td" style="width:150px;">مصر ناصری</span>
      <span class="td" style="width:190px;">وحدت عربی</span>
      <span class="td" style="width:180px;">شکست و تفرقه</span>
      <span class="td" style="width:80px;"><span class="red">D</span></span>
    </div>
  </foreignObject>

  <!-- Row 6 -->
  <rect class="row-even" x="60" y="758" width="960" height="85" rx="6"/>
  <foreignObject x="70" y="764" width="940" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;align-items:center;">
      <span class="td" style="width:170px;"><span class="pink">کمونیسم بین‌الملل</span></span>
      <span class="td" style="width:150px;">شوروی</span>
      <span class="td" style="width:190px;">رهایی کارگران</span>
      <span class="td" style="width:180px;">دولت‌های دست‌نشانده</span>
      <span class="td" style="width:80px;"><span class="red">D–E</span></span>
    </div>
  </foreignObject>

  <!-- Row 7 -->
  <rect class="row-odd" x="60" y="848" width="960" height="85" rx="6"/>
  <foreignObject x="70" y="854" width="940" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;text-align:center;align-items:center;">
      <span class="td" style="width:170px;"><span class="pink">دموکراسی‌سازی آمریکا</span></span>
      <span class="td" style="width:150px;">ایالات متحده</span>
      <span class="td" style="width:190px;">آزادی و دموکراسی</span>
      <span class="td" style="width:180px;">بی‌ثباتی مکرر</span>
      <span class="td" style="width:80px;"><span class="red">C–D</span></span>
    </div>
  </foreignObject>

  <!-- Insight card -->
  <rect class="card shadow" x="80" y="970" width="920" height="220"/>
  <foreignObject x="100" y="990" width="880" height="180">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div style="font-size:32px;color:#F48FB1;font-weight:800;">⚡ الگوی مشترک</div>
      <div style="font-size:25px;color:#ECEFF1;line-height:1.7;margin-top:14px;">
        در <span class="gold">هر هفت مورد</span>، ایدئولوژی نقش «مشروعیت‌ساز» را ایفا کرده:
        ابتدا قلب‌ها را تسخیر، سپس زمین را اشغال.
        هیچ‌کدام روی طیف به <span class="green">A یا B</span> نرسیده‌اند.
      </div>
    </div>
  </foreignObject>

  <foreignObject x="80" y="1250" width="920" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" class="footer"
         style="display:flex;justify-content:space-between;align-items:center;">
      <span>nations_salvation@ • لینک مطالعه در بیو</span>
      <span>اسلاید ۲ از ۵</span>
    </div>
  </foreignObject>
</svg>
