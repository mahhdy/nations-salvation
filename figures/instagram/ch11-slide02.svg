<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { direction:rtl; font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif; }
      .bg { fill:#0a0a1a; }
      .header-bar { fill:#1A237E; }
      .accent { fill:#F9A825; }
      .card { fill:#111428; stroke:#2a2f4a; stroke-width:1.4; rx:28; ry:28; }
      .step-card { fill:#151a30; stroke:#37474F; stroke-width:1.2; rx:22; ry:22; }
      .highlight-card { fill:#1a1030; stroke:#7C4DFF; stroke-width:2; rx:26; ry:26; }
      .shadow { filter:drop-shadow(0px 16px 36px rgba(0,0,0,0.45)); }
      .title { font-size:46px; font-weight:800; color:#FFFFFF; }
      .subtitle { font-size:26px; color:#CFD8DC; line-height:1.6; }
      .card-title { font-size:30px; font-weight:700; color:#FFFFFF; }
      .card-text { font-size:25px; line-height:1.7; color:#ECEFF1; }
      .gold { color:#F9A825; font-weight:700; }
      .purple { color:#B388FF; font-weight:700; }
      .red { color:#EF5350; font-weight:700; }
      .num { font-size:60px; font-weight:900; color:#7C4DFF; }
      .footer { font-size:24px; color:#78909C; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="1350"/>

  <rect class="header-bar" x="60" y="60" width="960" height="90" rx="22"/>
  <rect class="accent" x="80" y="82" width="10" height="46" rx="5"/>
  <foreignObject x="110" y="70" width="900" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;align-items:center;color:#FFF;font-size:28px;font-weight:600;">
      <span>ناامیدی آموخته‌شده</span>
      <span style="opacity:0.8;">فصل ۱۱ • روان‌شناسی نجات‌طلبی</span>
    </div>
  </foreignObject>

  <foreignObject x="80" y="180" width="920" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="title">وقتی ملتی <span class="red">یاد می‌گیرد</span> که نمی‌تواند</div>
      <div class="subtitle" style="margin-top:14px;">
        سلیگمن در ۱۹۶۷ نشان داد: موجودی که بارها در برابر درد
        <span class="gold">ناتوان بوده</span>، حتی وقتی راه فرار باز شود، دیگر تلاش نمی‌کند.
      </div>
    </div>
  </foreignObject>

  <!-- Step 1 -->
  <rect class="step-card shadow" x="80" y="350" width="920" height="180"/>
  <foreignObject x="100" y="365" width="880" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;align-items:flex-start;gap:20px;text-align:right;">
      <div class="num">۱</div>
      <div>
        <div class="card-title">تجربه‌ی مکرر شکست</div>
        <div class="card-text" style="margin-top:8px;">
          انقلاب‌های ناکام، اصلاحات سرکوب‌شده، وعده‌های توخالی…
          ملت بارها تلاش کرده و <span class="red">نتیجه نگرفته</span> است.
        </div>
      </div>
    </div>
  </foreignObject>

  <!-- Step 2 -->
  <rect class="step-card shadow" x="80" y="555" width="920" height="180"/>
  <foreignObject x="100" y="570" width="880" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;align-items:flex-start;gap:20px;text-align:right;">
      <div class="num">۲</div>
      <div>
        <div class="card-title">درونی‌سازی ناتوانی</div>
        <div class="card-text" style="margin-top:8px;">
          باور به اینکه «ما قادر به تغییر نیستیم» جایگزین تحلیل واقعی
          موانع می‌شود. <span class="purple">سوگیری تأیید</span> هم هر شکست جدید را
          تقویت می‌کند.
        </div>
      </div>
    </div>
  </foreignObject>

  <!-- Step 3 -->
  <rect class="step-card shadow" x="80" y="760" width="920" height="180"/>
  <foreignObject x="100" y="775" width="880" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;align-items:flex-start;gap:20px;text-align:right;">
      <div class="num">۳</div>
      <div>
        <div class="card-title">جستجوی نجات‌دهنده‌ی بیرونی</div>
        <div class="card-text" style="margin-top:8px;">
          چون «خودمان نمی‌توانیم»، پس باید کسی از بیرون بیاید:
          <span class="gold">ابرقدرت، سازمان بین‌المللی، رهبر کاریزماتیک</span>…
          هر کسی جز خودمان.
        </div>
      </div>
    </div>
  </foreignObject>

  <!-- Highlight -->
  <rect class="highlight-card shadow" x="80" y="975" width="920" height="200"/>
  <foreignObject x="100" y="995" width="880" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div style="font-size:34px;color:#F9A825;font-weight:800;">⚡ نکته‌ی تکان‌دهنده</div>
      <div class="card-text" style="margin-top:14px;">
        نجات‌طلبی لزوماً نشانه‌ی حماقت نیست؛ اغلب
        <span class="purple">واکنش طبیعیِ مغز</span> به سال‌ها استبداد، سرکوب و
        ناکامی مکرر است. اما درمان آن <span class="gold">خودآگاهی جمعی</span> است،
        نه مداخله‌ی خارجی.
      </div>
    </div>
  </foreignObject>

  <foreignObject x="80" y="1240" width="920" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" class="footer"
         style="display:flex;justify-content:space-between;align-items:center;">
      <span>nations_salvation@ • لینک مطالعه در بیو</span>
      <span>اسلاید ۲ از ۶</span>
    </div>
  </foreignObject>
</svg>
