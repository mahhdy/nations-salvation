<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { direction:rtl; font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif; }
      .bg { fill:#0a0a1a; }
      .header-bar { fill:#1A237E; }
      .accent { fill:#F9A825; }
      .card { fill:#111428; stroke:#2a2f4a; stroke-width:1.4; rx:28; ry:28; }
      .alert-card { fill:#1a1212; stroke:#EF5350; stroke-width:2; rx:26; ry:26; }
      .shadow { filter:drop-shadow(0px 16px 36px rgba(0,0,0,0.45)); }
      .title { font-size:44px; font-weight:800; color:#FFFFFF; }
      .subtitle { font-size:26px; color:#CFD8DC; line-height:1.6; }
      .card-title { font-size:30px; font-weight:700; color:#FFFFFF; }
      .card-text { font-size:25px; line-height:1.7; color:#ECEFF1; }
      .gold { color:#F9A825; font-weight:700; }
      .red { color:#EF5350; font-weight:700; }
      .big-stat { font-size:90px; font-weight:900; color:#EF5350; }
      .footer { font-size:24px; color:#78909C; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="1350"/>

  <rect class="header-bar" x="60" y="60" width="960" height="90" rx="22"/>
  <rect class="accent" x="80" y="82" width="10" height="46" rx="5"/>
  <foreignObject x="110" y="70" width="900" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="display:flex;justify-content:space-between;align-items:center;color:#FFF;font-size:28px;font-weight:600;">
      <span>آزمایش میلگرام</span>
      <span style="opacity:0.8;">فصل ۱۱ • روان‌شناسی نجات‌طلبی</span>
    </div>
  </foreignObject>

  <foreignObject x="80" y="180" width="920" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="title">وقتی «مرجعیت» می‌گوید، مردم <span class="red">اطاعت</span> می‌کنند</div>
      <div class="subtitle" style="margin-top:14px;">
        آزمایش میلگرام (۱۹۶۳) نشان داد: اکثر مردم عادی حاضرند
        به فرمان یک «مرجع» دست به اعمالی بزنند که خودشان غلط می‌دانند.
      </div>
    </div>
  </foreignObject>

  <!-- Hero stat -->
  <rect class="alert-card shadow" x="80" y="320" width="920" height="280"/>
  <foreignObject x="100" y="340" width="880" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div class="big-stat">٪۶۵</div>
      <div class="card-text" style="margin-top:10px;">
        از شرکت‌کنندگان آزمایش میلگرام، <span class="red">حاضر شدند شوک الکتریکی
        کشنده بزنند</span> فقط چون یک فرد «صاحب اتوریته»
        دستور داده بود.
      </div>
    </div>
  </foreignObject>

  <!-- Application card -->
  <rect class="card shadow" x="80" y="630" width="920" height="420"/>
  <foreignObject x="100" y="650" width="880" height="380">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="card-title">کاربرد در نجات‌طلبیِ ملی</div>
      <div class="card-text" style="margin-top:18px;">
        • وقتی یک <span class="gold">ابرقدرت یا سازمان بین‌المللی</span> می‌گوید
        «مداخله لازم است»، مردم تمایل دارند بدون تحلیل مستقل
        آن را بپذیرند.<br/><br/>
        • <span class="gold">رسانه‌های بزرگ</span> نقش «آزمایشگر» را بازی می‌کنند:
        «کارشناسان می‌گویند»، «شورای امنیت تصویب کرد»،
        «متحدان بین‌المللی توافق کردند»…<br/><br/>
        • <span class="red">نکته‌ی تکان‌دهنده:</span> حتی اپوزیسیون‌هایی که
        از استبداد داخلی فرار کرده‌اند، گاهی بدون سؤال
        به «اتوریته‌ی خارجی جدید» تسلیم می‌شوند.<br/><br/>
        • درس میلگرام: <span class="gold">اطاعت کورکورانه</span> ذاتی نیست؛
        آموزش تفکر انتقادی و مسئولیت فردی می‌تواند
        این الگو را بشکند.
      </div>
    </div>
  </foreignObject>

  <!-- Bottom -->
  <rect class="card shadow" x="80" y="1080" width="920" height="130"/>
  <foreignObject x="100" y="1095" width="880" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:center;">
      <div style="font-size:30px;color:#F9A825;font-weight:800;">🎯 پیام نهایی فصل ۱۱</div>
      <div class="card-text" style="margin-top:8px;">
        نجات‌طلبی یک <span class="gold">بیماری روان‌شناختی-اجتماعی</span> است نه فقط یک
        انتخاب سیاسی. درمانش هم روان‌شناختی است: بازسازی عاملیت جمعی.
      </div>
    </div>
  </foreignObject>

  <foreignObject x="80" y="1250" width="920" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" class="footer"
         style="display:flex;justify-content:space-between;align-items:center;">
      <span>nations_salvation@ • لینک مطالعه در بیو</span>
      <span>اسلاید ۵ از ۶</span>
    </div>
  </foreignObject>
</svg>
