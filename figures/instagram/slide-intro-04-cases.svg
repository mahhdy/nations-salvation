<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" xml:lang="fa">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#080c18"/><stop offset="100%" stop-color="#12182d"/></linearGradient>
  <radialGradient id="gl" cx="50%" cy="30%" r="35%"><stop offset="0%" stop-color="#301520" stop-opacity=".4"/><stop offset="100%" stop-color="#12182d" stop-opacity="0"/></radialGradient>
  <linearGradient id="tg" x1="0" y1="0" x2="1" y2=".2"><stop offset="0%" stop-color="#ff4081"/><stop offset="100%" stop-color="#ffd740"/></linearGradient>
</defs>
<rect width="1080" height="1350" fill="url(#bg)"/>
<rect width="1080" height="1350" fill="url(#gl)"/>
<g fill="#fff" opacity=".3"><circle cx="90" cy="70" r="1.2"/><circle cx="500" cy="40" r="1.5"/><circle cx="980" cy="100" r="1"/></g>

<!-- badge -->
<rect x="30" y="30" width="340" height="52" rx="26" fill="#131d33" stroke="#253350" stroke-width="1"/>
<text x="200" y="64" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="22" fill="#5580aa">معرفی کتاب • ۴ از ۵</text>

<!-- title -->
<text x="540" y="160" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="56" font-weight="700" fill="url(#tg)">موارد تاریخی کلیدی</text>
<text x="540" y="215" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="26" fill="#607a8a">هر مورد، یک درس برای ملت‌ها</text>
<line x1="200" y1="250" x2="880" y2="250" stroke="#301520" stroke-width="2"/>

<!-- Row 1 -->
<rect x="555" y="280" width="470" height="170" rx="16" fill="#151d30" stroke="#ff4081" stroke-width="2"/>
<rect x="555" y="280" width="8" height="170" rx="4" fill="#ff4081"/>
<text x="1000" y="325" text-anchor="end" font-family="Tahoma,sans-serif" font-size="20" font-weight="700" fill="#ff4081">شکست</text>
<text x="1000" y="370" text-anchor="end" font-family="Tahoma,sans-serif" font-size="30" font-weight="700" fill="#f8bbd0">کودتای ۲۸ مرداد</text>
<text x="1000" y="415" text-anchor="end" font-family="Tahoma,sans-serif" font-size="22" fill="#546e7a">ایران ۱۹۵۳ — سرنگونی مصدق</text>

<rect x="55" y="280" width="470" height="170" rx="16" fill="#151d30" stroke="#ffd740" stroke-width="2"/>
<rect x="55" y="280" width="8" height="170" rx="4" fill="#ffd740"/>
<text x="500" y="325" text-anchor="end" font-family="Tahoma,sans-serif" font-size="20" font-weight="700" fill="#ffd740">شکست</text>
<text x="500" y="370" text-anchor="end" font-family="Tahoma,sans-serif" font-size="30" font-weight="700" fill="#fff9c4">عراق ۲۰۰۳</text>
<text x="500" y="415" text-anchor="end" font-family="Tahoma,sans-serif" font-size="22" fill="#546e7a">۲۰ سال بی‌ثباتی — ظهور داعش</text>

<!-- Row 2 -->
<rect x="555" y="475" width="470" height="170" rx="16" fill="#151d30" stroke="#ff4081" stroke-width="2"/>
<rect x="555" y="475" width="8" height="170" rx="4" fill="#ff4081"/>
<text x="1000" y="520" text-anchor="end" font-family="Tahoma,sans-serif" font-size="20" font-weight="700" fill="#ff4081">فاجعه</text>
<text x="1000" y="565" text-anchor="end" font-family="Tahoma,sans-serif" font-size="30" font-weight="700" fill="#f8bbd0">لیبی ۲۰۱۱</text>
<text x="1000" y="610" text-anchor="end" font-family="Tahoma,sans-serif" font-size="22" fill="#546e7a">بازار برده‌فروشی — دولت شکست‌خورده</text>

<rect x="55" y="475" width="470" height="170" rx="16" fill="#151d30" stroke="#69f0ae" stroke-width="2"/>
<rect x="55" y="475" width="8" height="170" rx="4" fill="#69f0ae"/>
<text x="500" y="520" text-anchor="end" font-family="Tahoma,sans-serif" font-size="20" font-weight="700" fill="#69f0ae">موفقیت</text>
<text x="500" y="565" text-anchor="end" font-family="Tahoma,sans-serif" font-size="30" font-weight="700" fill="#b9f6ca">آفریقای جنوبی</text>
<text x="500" y="610" text-anchor="end" font-family="Tahoma,sans-serif" font-size="22" fill="#546e7a">عاملیت داخلی + فشار خارجی</text>

<!-- Row 3 -->
<rect x="555" y="670" width="470" height="170" rx="16" fill="#151d30" stroke="#ffd740" stroke-width="2"/>
<rect x="555" y="670" width="8" height="170" rx="4" fill="#ffd740"/>
<text x="1000" y="715" text-anchor="end" font-family="Tahoma,sans-serif" font-size="20" font-weight="700" fill="#ffd740">درس مهم</text>
<text x="1000" y="760" text-anchor="end" font-family="Tahoma,sans-serif" font-size="30" font-weight="700" fill="#fff9c4">رواندا ۱۹۹۴</text>
<text x="1000" y="805" text-anchor="end" font-family="Tahoma,sans-serif" font-size="22" fill="#546e7a">۸۰۰ هزار کشته — قیمت عدم مداخله</text>

<rect x="55" y="670" width="470" height="170" rx="16" fill="#151d30" stroke="#00e5ff" stroke-width="2"/>
<rect x="55" y="670" width="8" height="170" rx="4" fill="#00e5ff"/>
<text x="500" y="715" text-anchor="end" font-family="Tahoma,sans-serif" font-size="20" font-weight="700" fill="#00e5ff">پیچیده</text>
<text x="500" y="760" text-anchor="end" font-family="Tahoma,sans-serif" font-size="30" font-weight="700" fill="#b2ebf2">افغانستان</text>
<text x="500" y="805" text-anchor="end" font-family="Tahoma,sans-serif" font-size="22" fill="#546e7a">۲۰ سال اشغال — بازگشت طالبان</text>

<!-- pattern box -->
<rect x="60" y="880" width="960" height="140" rx="18" fill="#0d1520" stroke="#ff80ab" stroke-width="1.5"/>
<text x="540" y="935" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="32" font-weight="700" fill="#ff80ab">الگوی تکرارشونده</text>
<text x="540" y="990" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="24" fill="#7a8a9a">وعده → مداخله → بی‌ثباتی → وابستگی → سرخوردگی</text>

<!-- bottom categories -->
<rect x="710" y="1060" width="310" height="100" rx="14" fill="#111a2e" stroke="#b388ff" stroke-width="1.5"/>
<text x="865" y="1105" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="24" font-weight="700" fill="#d1c4e9">بهار عربی</text>
<text x="865" y="1140" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="18" fill="#546e7a">مصر، تونس، سوریه</text>

<rect x="385" y="1060" width="310" height="100" rx="14" fill="#111a2e" stroke="#ea80fc" stroke-width="1.5"/>
<text x="540" y="1105" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="24" font-weight="700" fill="#e1bee7">استعمار</text>
<text x="540" y="1140" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="18" fill="#546e7a">آفریقا، هند، الجزایر</text>

<rect x="60" y="1060" width="310" height="100" rx="14" fill="#111a2e" stroke="#ff4081" stroke-width="1.5"/>
<text x="215" y="1105" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="24" font-weight="700" fill="#f8bbd0">جنگ سرد</text>
<text x="215" y="1140" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="18" fill="#546e7a">شیلی، ویتنام، کنگو</text>

<!-- bottom -->
<text x="540" y="1240" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="22" fill="#3d5060">بیش از ۳۰ مطالعه‌ی موردی در ۱۵ فصل</text>
</svg>