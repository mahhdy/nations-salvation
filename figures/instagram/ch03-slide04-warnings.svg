<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <style>
      .rtl { direction: rtl; text-align: center; font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif; }
      .rtl-right { direction: rtl; text-align: right; font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif; padding-right: 20px; }
    </style>
  </defs>
  
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>
  
  <!-- Header -->
  <rect x="660" y="30" width="380" height="50" rx="25" fill="#DC2626"/>
  <foreignObject x="660" y="30" width="380" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#FFFFFF; font-size:28px; line-height:50px;">فصل   اسلاید </div>
  </foreignObject>
  
  <!-- Title -->
  <foreignObject x="40" y="100" width="1000" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="font-size:50px; font-weight:bold; color:#DC2626;"> علائم هشدار شکست</div>
  </foreignObject>
  <foreignObject x="40" y="160" width="1000" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#94A3B8; font-size:28px;">چه شرایطی نشاندهندهی فاجعه است</div>
  </foreignObject>
  
  <!-- Warning 1 -->
  <rect x="60" y="220" width="960" height="95" rx="15" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-width="2"/>
  <foreignObject x="900" y="235" width="100" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#DC2626; font-size:36px; font-weight:bold; text-align:center;"></div>
  </foreignObject>
  <foreignObject x="80" y="245" width="810" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:26px; font-weight:bold;">تنشهای قومی/مذهبی عمیق</div>
  </foreignObject>
  <foreignObject x="80" y="280" width="810" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:22px;">مثل: عراق (شیعه/سنی/کرد) یوگسلاوی</div>
  </foreignObject>
  
  <!-- Warning 2 -->
  <rect x="60" y="330" width="960" height="95" rx="15" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-width="2"/>
  <foreignObject x="900" y="345" width="100" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#DC2626; font-size:36px; font-weight:bold; text-align:center;"></div>
  </foreignObject>
  <foreignObject x="80" y="355" width="810" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:26px; font-weight:bold;">فقدان نهادهای دولتی کارآمد</div>
  </foreignObject>
  <foreignObject x="80" y="390" width="810" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:22px;">مثل: سومالی لیبی افغانستان</div>
  </foreignObject>
  
  <!-- Warning 3 -->
  <rect x="60" y="440" width="960" height="95" rx="15" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-width="2"/>
  <foreignObject x="900" y="455" width="100" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#DC2626; font-size:36px; font-weight:bold; text-align:center;"></div>
  </foreignObject>
  <foreignObject x="80" y="465" width="810" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:26px; font-weight:bold;">مداخلهگر فاقد برنامهی روز بعد</div>
  </foreignObject>
  <foreignObject x="80" y="500" width="810" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:22px;">مثل: عراق   پیروزی بدون برنامه</div>
  </foreignObject>
  
  <!-- Warning 4 -->
  <rect x="60" y="550" width="960" height="95" rx="15" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-width="2"/>
  <foreignObject x="900" y="565" width="100" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#DC2626; font-size:36px; font-weight:bold; text-align:center;"></div>
  </foreignObject>
  <foreignObject x="80" y="575" width="810" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:26px; font-weight:bold;">همسایگان متخاصم</div>
  </foreignObject>
  <foreignObject x="80" y="610" width="810" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:22px;">همسایگانی که از بیثباتی سود میبرند</div>
  </foreignObject>
  
  <!-- Warning 5 -->
  <rect x="60" y="660" width="960" height="95" rx="15" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-width="2"/>
  <foreignObject x="900" y="675" width="100" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#DC2626; font-size:36px; font-weight:bold; text-align:center;"></div>
  </foreignObject>
  <foreignObject x="80" y="685" width="810" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:26px; font-weight:bold;">اقتصاد وابسته به یک منبع</div>
  </foreignObject>
  <foreignObject x="80" y="720" width="810" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:22px;">نفت = نفرین منابع = فساد + جنگ داخلی</div>
  </foreignObject>
  
  <!-- Warning 6 -->
  <rect x="60" y="770" width="960" height="95" rx="15" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-width="2"/>
  <foreignObject x="900" y="785" width="100" height="65">
    <div xmlns="http://www.w3.org/1999/xhtml" style="color:#DC2626; font-size:36px; font-weight:bold; text-align:center;"></div>
  </foreignObject>
  <foreignObject x="80" y="795" width="810" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#F87171; font-size:26px; font-weight:bold;">تاریخ ضداستعماری قوی</div>
  </foreignObject>
  <foreignObject x="80" y="830" width="810" height="30">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl-right" style="color:#FFFFFF; font-size:22px;">مقاومت علیه اشغالگر ادامه خواهد یافت</div>
  </foreignObject>
  
  <!-- Key stat box -->
  <rect x="100" y="890" width="880" height="120" rx="20" fill="#1A237E" stroke="#F9A825" stroke-width="3"/>
  <foreignObject x="100" y="910" width="880" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#F9A825; font-size:28px; font-weight:bold;"> آمار تاریخی:</div>
  </foreignObject>
  <foreignObject x="100" y="955" width="880" height="45">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#FFFFFF; font-size:26px;">مداخلاتی با + علامت هشدار:  شکست (سطح D-F)</div>
  </foreignObject>
  
  <!-- Navigation -->
  <foreignObject x="40" y="1040" width="1000" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#00D9FF; font-size:26px;">بعدی: چکلیست تصمیمگیری </div>
  </foreignObject>
  
  <foreignObject x="40" y="1100" width="1000" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" class="rtl" style="color:#64748B; font-size:22px;">@nations_salvation</div>
  </foreignObject>
  
  <rect x="40" y="1306" width="1000" height="4" rx="2" fill="url(#titleGrad)"/>
</svg>
