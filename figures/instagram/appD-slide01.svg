<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root { direction:rtl; font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif; }
      .bg { fill:#060610; }
      .header-bar { fill:#1A237E; }
      .accent { fill:#F9A825; }
      .card { fill:#0e0e1c; stroke:#283593; stroke-width:1.4; rx:28; ry:28; }
      .table-card { fill:#0e0e1c; stroke:#F9A825; stroke-width:2; rx:28; ry:28; }
      .row-h { fill:#1A237E; }
      .row-a { fill:#0a1a0a; stroke:#2E7D32; stroke-width:1; }
