<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" xml:lang="fa">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#080c18"/><stop offset="100%" stop-color="#12182d"/></linearGradient>
  <radialGradient id="gl" cx="50%" cy="32%" r="35%"><stop offset="0%" stop-color="#2a1545" stop-opacity=".5"/><stop offset="100%" stop-color="#12182d" stop-opacity="0"/></radialGradient>
  <linearGradient id="tg" x1="0" y1="0" x2="1" y2=".2"><stop offset="0%" stop-color="#b388ff"/><stop offset="100%" stop-color="#ea80fc"/></linearGradient>
  <filter id="sg"><feGaussianBlur stdDeviation="10"/><feComposite in="SourceGraphic" operator="over"/></filter>
</defs>
<rect width="1080" height="1350" fill="url(#bg)"/>
<rect width="1080" height="1350" fill="url(#gl)"/>
<g fill="#fff" opacity=".35"><circle cx="120" cy="100" r="1.2"/><circle cx="400" cy="60" r="1"/><circle cx="700" cy="130" r="1.5"/><circle cx="950" cy="80" r="1"/><circle cx="200" cy="1200" r="1.2"/><circle cx="880" cy="1100" r="1"/></g>

<!-- badge top-left -->
<rect x="30" y="30" width="340" height="52" rx="26" fill="#131d33" stroke="#253350" stroke-width="1"/>
<text x="200" y="64" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="22" fill="#5580aa">معرفی کتاب • ۲ از ۵</text>

<!-- big ? watermark -->
<text x="540" y="420" text-anchor="middle" font-family="Georgia,serif" font-size="320" fill="none" stroke="#b388ff" stroke-width="2" opacity=".08">?</text>

<!-- title -->
<text x="540" y="240" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="60" font-weight="700" fill="url(#tg)">پرسش بنیادین کتاب</text>
<line x1="180" y1="280" x2="900" y2="280" stroke="#352050" stroke-width="2"/>

<!-- Question 1 -->
<rect x="60" y="330" width="960" height="180" rx="20" fill="#151d30" stroke="#b388ff" stroke-width="2"/>
<rect x="870" y="355" width="110" height="48" rx="12" fill="#b388ff"/>
<text x="925" y="388" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="28" font-weight="700" fill="#080c18">۱</text>
<text x="840" y="395" text-anchor="end" font-family="Tahoma,sans-serif" font-size="32" font-weight="700" fill="#d1c4e9">چرا ملت‌ها به قدرت‌های</text>
<text x="840" y="445" text-anchor="end" font-family="Tahoma,sans-serif" font-size="32" font-weight="700" fill="#d1c4e9">خارجی امید می‌بندند؟</text>

<!-- Question 2 -->
<rect x="60" y="540" width="960" height="180" rx="20" fill="#151d30" stroke="#ea80fc" stroke-width="2"/>
<rect x="870" y="565" width="110" height="48" rx="12" fill="#ea80fc"/>
<text x="925" y="598" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="28" font-weight="700" fill="#080c18">۲</text>
<text x="840" y="605" text-anchor="end" font-family="Tahoma,sans-serif" font-size="32" font-weight="700" fill="#e1bee7">چرا این امید تقریباً همیشه</text>
<text x="840" y="655" text-anchor="end" font-family="Tahoma,sans-serif" font-size="32" font-weight="700" fill="#e1bee7">به ناامیدی تبدیل می‌شود؟</text>

<!-- Question 3 -->
<rect x="60" y="750" width="960" height="180" rx="20" fill="#151d30" stroke="#ff80ab" stroke-width="2"/>
<rect x="870" y="775" width="110" height="48" rx="12" fill="#ff80ab"/>
<text x="925" y="808" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="28" font-weight="700" fill="#080c18">۳</text>
<text x="840" y="815" text-anchor="end" font-family="Tahoma,sans-serif" font-size="32" font-weight="700" fill="#f8bbd0">جایگزین نجات‌طلبی چیست؟</text>
<text x="840" y="865" text-anchor="end" font-family="Tahoma,sans-serif" font-size="32" font-weight="700" fill="#f8bbd0">ملت‌ها چگونه خود را نجات دهند؟</text>

<!-- bottom quote box -->
<rect x="80" y="990" width="920" height="220" rx="18" fill="#0d1520" stroke="#253350" stroke-width="1.5"/>
<text x="540" y="1055" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="28" fill="#7a8a9a">«هر ملتی که آزادی خود را</text>
<text x="540" y="1100" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="28" fill="#7a8a9a">مدیون دست بیگانه باشد</text>
<text x="540" y="1145" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="28" fill="#7a8a9a">شایسته‌ی حفظ آن نیست.»</text>
<text x="540" y="1190" text-anchor="middle" font-family="Tahoma,sans-serif" font-size="22" fill="#4a5f75">— جان استوارت میل، ۱۸۵۹</text>
</svg>