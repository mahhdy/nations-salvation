<svg width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080412"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg4)"/>

  <!-- Tag -->
  <rect x="310" y="60" width="460" height="56" rx="28" fill="rgba(124,77,255,0.12)" stroke="#7C4DFF" stroke-width="1"/>
  <foreignObject x="310" y="68" width="460" height="42">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="text-align:center;font-family:'Estedad','Vazirmatn',sans-serif;
                font-size:24px;color:#B388FF;">مدل تحلیلی اصلی کتاب</div>
  </foreignObject>

  <!-- Title -->
  <foreignObject x="60" y="140" width="960" height="140">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="text-align:center;font-family:'IRANSansX','Vazirmatn',sans-serif;">
      <div style="font-size:64px;font-weight:900;color:#FFFFFF;">
        🔬 مدل <span style="color:#B388FF;">شش‌وجهی</span>
      </div>
    </div>
  </foreignObject>

  <!-- 6 cards in 2x3 grid -->
  <!-- Card 1 -->
  <rect x="80" y="310" width="440" height="160" rx="24" fill="#0e0a1e" stroke="#3F51B5" stroke-width="2"/>
  <foreignObject x="100" y="325" width="400" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="font-family:'IRANSansX','Vazirmatn',sans-serif;text-align:right;">
      <div style="font-size:28px;font-weight:800;color:#7986CB;">۱. ساختاری–سیاسی</div>
      <div style="font-size:22px;color:#B0BEC5;margin-top:8px;line-height:1.5;">
        ماهیت رژیم · بحران مشروعیت · نهادهای مدنی
      </div>
    </div>
  </foreignObject>

  <!-- Card 2 -->
  <rect x="560" y="310" width="440" height="160" rx="24" fill="#0e0a1e" stroke="#26A69A" stroke-width="2"/>
  <foreignObject x="580" y="325" width="400" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="font-family:'IRANSansX','Vazirmatn',sans-serif;text-align:right;">
      <div style="font-size:28px;font-weight:800;color:#4DB6AC;">۲. حقوقی–هنجاری</div>
      <div style="font-size:22px;color:#B0BEC5;margin-top:8px;line-height:1.5;">
        مبنای حقوقی · مجوز بین‌المللی · هنجارها
      </div>
    </div>
  </foreignObject>

  <!-- Card 3 -->
  <rect x="80" y="495" width="440" height="160" rx="24" fill="#0e0a1e" stroke="#F9A825" stroke-width="2"/>
  <foreignObject x="100" y="510" width="400" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="font-family:'IRANSansX','Vazirmatn',sans-serif;text-align:right;">
      <div style="font-size:28px;font-weight:800;color:#F9A825;">۳. اقتصادی</div>
      <div style="font-size:22px;color:#B0BEC5;margin-top:8px;line-height:1.5;">
        منابع طبیعی · وابستگی · نفرین منابع
      </div>
    </div>
  </foreignObject>

  <!-- Card 4 -->
  <rect x="560" y="495" width="440" height="160" rx="24" fill="#0e0a1e" stroke="#EF5350" stroke-width="2"/>
  <foreignObject x="580" y="510" width="400" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="font-family:'IRANSansX','Vazirmatn',sans-serif;text-align:right;">
      <div style="font-size:28px;font-weight:800;color:#EF5350;">۴. نظامی–امنیتی</div>
      <div style="font-size:22px;color:#B0BEC5;margin-top:8px;line-height:1.5;">
        توازن قوا · ظرفیت دفاعی · تهدیدات
      </div>
    </div>
  </foreignObject>

  <!-- Card 5 -->
  <rect x="80" y="680" width="440" height="160" rx="24" fill="#0e0a1e" stroke="#CE93D8" stroke-width="2"/>
  <foreignObject x="100" y="695" width="400" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="font-family:'IRANSansX','Vazirmatn',sans-serif;text-align:right;">
      <div style="font-size:28px;font-weight:800;color:#CE93D8;">۵. روان‌شناختی–فرهنگی</div>
      <div style="font-size:22px;color:#B0BEC5;margin-top:8px;line-height:1.5;">
        هویت ملی · سوگیری‌ها · تروما · آرزواندیشی
      </div>
    </div>
  </foreignObject>

  <!-- Card 6 -->
  <rect x="560" y="680" width="440" height="160" rx="24" fill="#0e0a1e" stroke="#4DD0E1" stroke-width="2"/>
  <foreignObject x="580" y="695" width="400" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="font-family:'IRANSansX','Vazirmatn',sans-serif;text-align:right;">
      <div style="font-size:28px;font-weight:800;color:#4DD0E1;">۶. ژئوپولیتیک</div>
      <div style="font-size:22px;color:#B0BEC5;margin-top:8px;line-height:1.5;">
        موقعیت استراتژیک · رقابت قدرت‌ها
      </div>
    </div>
  </foreignObject>

  <!-- Golden rule -->
  <rect x="80" y="890" width="920" height="140" rx="28" fill="rgba(249,168,37,0.06)" stroke="#F9A825" stroke-width="1.5"/>
  <foreignObject x="100" y="905" width="880" height="110">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="text-align:center;font-family:'IRANSansX','Vazirmatn',sans-serif;">
      <div style="font-size:30px;font-weight:800;color:#F9A825;">💡 قانون طلایی</div>
      <div style="font-size:26px;color:#ECEFF1;margin-top:10px;">
        تحلیل یک‌بُعدی = تصمیم اشتباه = فاجعه
      </div>
    </div>
  </foreignObject>

  <!-- Example -->
  <rect x="80" y="1060" width="920" height="140" rx="24" fill="rgba(239,83,80,0.06)" stroke="#EF5350" stroke-width="1"/>
  <foreignObject x="100" y="1075" width="880" height="110">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="text-align:center;font-family:'Sahel','Vazirmatn',sans-serif;
                font-size:24px;color:#ECEFF1;line-height:1.6;">
      <span style="color:#EF5350;font-weight:700;">مثال عراق ۲۰۰۳:</span><br/>
      تحلیل فقط نظامی → پیروزی سریع |<br/> اما غفلت از ابعاد ۱، ۵ و ۶ → فاجعه ۲۰ ساله
    </div>
  </foreignObject>

  <foreignObject x="0" y="1280" width="1080" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="text-align:center;font-family:'Sahel','Vazirmatn',sans-serif;
                font-size:22px;color:#546E7A;">nations_salvation@ · ۴ از ۱۰</div>
  </foreignObject>
</svg>
