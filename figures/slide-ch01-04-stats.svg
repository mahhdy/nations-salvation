<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#080c18"/><stop offset="100%" stop-color="#12182d"/></linearGradient>
  <radialGradient id="gl" cx="50%" cy="40%" r="35%"><stop offset="0%" stop-color="#300d0d" stop-opacity=".3"/><stop offset="100%" stop-color="#12182d" stop-opacity="0"/></radialGradient>
  <linearGradient id="tg" x1="0" y1="0" x2="1" y2=".2"><stop offset="0%" stop-color="#ff4081"/><stop offset="100%" stop-color="#ff8a80"/></linearGradient>
  <filter id="sg"><feGaussianBlur stdDeviation="10"/><feComposite in="SourceGraphic" operator="over"/></filter>
</defs>
<rect width="1080" height="1350" fill="url(#bg)"/>
<rect width="1080" height="1350" fill="url(#gl)"/>
<g fill="#fff" opacity=".3"><circle cx="100" cy="80" r="1.2"/><circle cx="450" cy="60" r="1.5"/><circle cx="980" cy="120" r="1"/></g>
<rect x="650" y="30" width="400" height="44" rx="22" fill="#131d33" stroke="#00e5ff" stroke-width="1"/>
<text x="850" y="59" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="18" fill="#00bcd4" direction="rtl">فصل ۱ • اسلاید ۴ از ۵</text>
<!-- big stat -->
<text x="540" y="170" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="38" font-weight="700" fill="url(#tg)" direction="rtl">آمار تکان‌دهنده</text>
<line x1="300" y1="200" x2="780" y2="200" stroke="#300d0d" stroke-width="1.5"/>
<!-- giant percentage -->
<text x="540" y="420" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="200" font-weight="900" fill="#ff4081" opacity=".9" filter="url(#sg)">۸۴٪</text>
<text x="540" y="500" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="32" fill="#ef9a9a" direction="rtl">مداخلات خارجی برای «تغییر رژیم»</text>
<text x="540" y="545" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="32" fill="#ef9a9a" direction="rtl">به دموکراسی پایدار نرسیده‌اند</text>
<!-- source -->
<text x="540" y="595" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#4a5568" direction="rtl">منبع: Downes &amp; Monten, 2013, International Security</text>
<!-- more stats row -->
<rect x="80" y="650" width="290" height="170" rx="14" fill="#111a2e" stroke="#ff4081" stroke-width="1.3"/>
<text x="225" y="720" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="52" font-weight="900" fill="#ff4081">۷۰M</text>
<text x="225" y="770" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#546e7a" direction="rtl">کشته‌ی جنگ جهانی دوم</text>
<text x="225" y="800" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="14" fill="#3d5060" direction="rtl">(پرهزینه‌ترین مداخله‌ی موفق)</text>

<rect x="395" y="650" width="290" height="170" rx="14" fill="#111a2e" stroke="#ffd740" stroke-width="1.3"/>
<text x="540" y="720" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="52" font-weight="900" fill="#ffd740">\$2T</text>
<text x="540" y="770" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#546e7a" direction="rtl">هزینه‌ی جنگ افغانستان</text>
<text x="540" y="800" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="14" fill="#3d5060" direction="rtl">(نتیجه: بازگشت طالبان)</text>

<rect x="710" y="650" width="290" height="170" rx="14" fill="#111a2e" stroke="#00e5ff" stroke-width="1.3"/>
<text x="855" y="720" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="52" font-weight="900" fill="#00e5ff">800K</text>
<text x="855" y="770" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#546e7a" direction="rtl">قربانی نسل‌کشی رواندا</text>
<text x="855" y="800" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="14" fill="#3d5060" direction="rtl">(قیمت عدم مداخله)</text>
<!-- insight -->
<rect x="80" y="880" width="920" height="160" rx="16" fill="#0d1520" stroke="#253350" stroke-width="1"/>
<text x="540" y="935" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="24" font-weight="700" fill="#ff80ab" direction="rtl">یافته‌ی اصلی فصل ۱:</text>
<text x="540" y="975" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#7a8a9a" direction="rtl">مشکل فقط «مداخله کردن» نیست —</text>
<text x="540" y="1010" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#7a8a9a" direction="rtl">«مداخله نکردن» هم فاجعه‌بار است.</text>
<text x="540" y="1035" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="18" font-weight="700" fill="#5c6f88" direction="rtl">پرسش درست: چه نوع اقدامی؟ توسط چه کسی؟</text>
</svg>