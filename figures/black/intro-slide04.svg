<svg width="1080" height="1350" viewBox="0 0 1080 1350"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradAF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#F9A825;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#EF6C00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:1"/>
    </linearGradient>
    <style>
      :root{
        direction:rtl;
        font-family:"Vazirmatn","Shabnam","Sahel","IRANSansX","Segoe UI",sans-serif;
      }
      .bg{fill:#040612;}
      .title{font-size:48px;font-weight:900;color:#FFFFFF;}
      .subtitle{font-size:28px;color:#CFD8DC;}
      .bar-bg{fill:#101322;rx:28;ry:28;}
      .footer{font-size:26px;color:#90A4AE;}
      .label{font-size:30px;font-weight:800;fill:#FFFFFF;}
      .desc{font-size:24px;fill:#ECEFF1;}
    </style>
  </defs>

  <rect class="bg" width="1080" height="1350"/>

  <foreignObject x="80" y="80" width="920" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="text-align:right;">
      <div class="title">طیف نتایج مداخله: از A تا F</div>
      <div class="subtitle" style="margin-top:10px;">
        کتاب هر مداخله را روی این خط‌کشی می‌نشاند؛
        <span style="color:#F9A825;">رنگ‌ها</span> حرف آخر را می‌زنند.
      </div>
    </div>
  </foreignObject>

  <rect class="bar-bg" x="80" y="260" width="920" height="160"/>
  <rect x="100" y="280" width="880" height="120" rx="24" ry="24" fill="url(#gradAF)"/>

  <!-- Labels -->
  <text x="140" y="350" class="label">A</text>
  <text x="300" y="350" class="label">B</text>
  <text x="460" y="350" class="label">C</text>
  <text x="620" y="350" class="label">D</text>
  <text x="780" y="350" class="label">E</text>
  <text x="940" y="350" class="label">F</text>

  <!-- Descriptions -->
  <foreignObject x="80" y="450" width="920" height="560">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" style="font-size:30px;color:#ECEFF1;line-height:1.15;">
      <b style="color:#66BB6A;">A. رهایی کامل و استقلال پایدار</b> — نمونه‌های انگشت‌شمار،
      مثل آلمان و ژاپن پس از جنگ جهانی دوم (با شرایط استثنایی).<br/><br/>
      <b style="color:#C0CA33;">B. رهایی با وابستگی محدود</b> — کشور مستقل است اما در
      برخی حوزه‌ها به مداخله‌گر گره خورده است.<br/><br/>
      <b style="color:#FFB74D;">C. تغییر رژیم اما بی‌ثباتی</b> — رژیم می‌رود، اما جنگ داخلی
      و ناامنی جایگزین می‌شود؛ نمونه: افغانستان.<br/><br/>
      <b style="color:#FB8C00;">D. رژیم دست‌نشانده و وابستگی ساختاری</b> — ظاهرِ استقلال،
      باطنِ وابستگی؛ نمونه‌های متعدد در جهان سوم.<br/><br/>
      <b style="color:#EF5350;">E. هرج‌ومرج و دولت شکست‌خورده</b> — لیبی، سومالی، بخش‌هایی از سوریه.<br/><br/>
      <b style="color:#B71C1C;">F. استعمار یا الحاق</b> — از مستعمرات قدیم تا الحاق کریمه.
    </div>
  </foreignObject>

  <foreignObject x="80" y="1020" width="920" height="200">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl"
         style="text-align:center;font-size:28px;color:#F9A825;font-weight:700;line-height:1.6">
      پرسش کتاب از هر خواننده:<br/>
      اگر کشورت امروز مداخله‌ی خارجی را بپذیرد، واقعاً روی کدام
      <span style="color:#EF5350;">حرف این طیف</span> می‌ایستد؟
    </div>
  </foreignObject>

  <foreignObject x="80" y="1220" width="920" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" dir="rtl" class="footer"
         style="display:flex;justify-content:space-between;align-items:center;">
      <span>جدول کامل طیف برای ۳۰+ پرونده در فصل ۱۰ و پیوست ت</span>
      <span>اسلاید ۴ از ۱۰</span>
    </div>
  </foreignObject>
</svg>
