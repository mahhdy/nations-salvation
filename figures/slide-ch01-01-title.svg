<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2=".3" y2="1"><stop offset="0%" stop-color="#080c18"/><stop offset="100%" stop-color="#12182d"/></linearGradient>
  <radialGradient id="gl" cx="50%" cy="35%" r="40%"><stop offset="0%" stop-color="#0d2a45" stop-opacity=".5"/><stop offset="100%" stop-color="#12182d" stop-opacity="0"/></radialGradient>
  <linearGradient id="tg" x1="0" y1="0" x2="1" y2=".2"><stop offset="0%" stop-color="#00e5ff"/><stop offset="50%" stop-color="#40c4ff"/><stop offset="100%" stop-color="#69f0ae"/></linearGradient>
  <filter id="sg"><feGaussianBlur stdDeviation="10"/><feComposite in="SourceGraphic" operator="over"/></filter>
</defs>
<rect width="1080" height="1350" fill="url(#bg)"/>
<rect width="1080" height="1350" fill="url(#gl)"/>
<g fill="#fff" opacity=".35"><circle cx="100" cy="70" r="1.2"/><circle cx="350" cy="120" r="1"/><circle cx="700" cy="60" r="1.5"/><circle cx="950" cy="150" r="1"/><circle cx="200" cy="1200" r="1.2"/><circle cx="880" cy="1100" r="1"/></g>
<rect x="650" y="30" width="400" height="44" rx="22" fill="#131d33" stroke="#00e5ff" stroke-width="1"/>
<text x="850" y="59" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="18" fill="#00bcd4" direction="rtl">فصل ۱ • اسلاید ۱ از ۵</text>
<circle cx="540" cy="280" r="80" fill="none" stroke="#00e5ff" stroke-width="3" opacity=".3"/>
<circle cx="540" cy="280" r="58" fill="#0a1525" stroke="#00e5ff" stroke-width="2"/>
<text x="540" y="305" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="52" font-weight="900" fill="#00e5ff">۱</text>
<text x="540" y="440" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="48" font-weight="900" fill="url(#tg)" direction="rtl" filter="url(#sg)">درآمد و چارچوب مفهومی</text>
<text x="540" y="500" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="26" fill="#607a8a" direction="rtl">نجات‌طلبی چیست و چرا مسئله‌ساز است؟</text>
<line x1="260" y1="540" x2="820" y2="540" stroke="#1a3040" stroke-width="1.5"/>
<text x="540" y="600" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="26" font-weight="700" fill="#5580aa" direction="rtl">مفاهیم کلیدی این فصل</text>
<!-- 4 concept cards -->
<rect x="560" y="640" width="440" height="120" rx="14" fill="#111a2e" stroke="#00e5ff" stroke-width="1.2"/>
<text x="780" y="688" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="24" font-weight="700" fill="#b2ebf2" direction="rtl">نجات‌طلبی</text>
<text x="780" y="728" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#546e7a" direction="rtl">امیدبستن به نیروی خارجی برای رهایی</text>
<rect x="80" y="640" width="440" height="120" rx="14" fill="#111a2e" stroke="#69f0ae" stroke-width="1.2"/>
<text x="300" y="688" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="24" font-weight="700" fill="#b9f6ca" direction="rtl">عاملیت جمعی</text>
<text x="300" y="728" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#546e7a" direction="rtl">توانایی ملت برای تغییر از درون</text>
<rect x="560" y="790" width="440" height="120" rx="14" fill="#111a2e" stroke="#ffd740" stroke-width="1.2"/>
<text x="780" y="838" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="24" font-weight="700" fill="#fff9c4" direction="rtl">آرزواندیشی</text>
<text x="780" y="878" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#546e7a" direction="rtl">خلط «آنچه می‌خواهیم» با «آنچه هست»</text>
<rect x="80" y="790" width="440" height="120" rx="14" fill="#111a2e" stroke="#ff80ab" stroke-width="1.2"/>
<text x="300" y="838" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="24" font-weight="700" fill="#f8bbd0" direction="rtl">مداخله‌ی خارجی</text>
<text x="300" y="878" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#546e7a" direction="rtl">ورود قدرت بیگانه در امور داخلی ملت</text>
<!-- bottom quote -->
<rect x="100" y="970" width="880" height="160" rx="16" fill="#0d1520" stroke="#253350" stroke-width="1"/>
<text x="540" y="1020" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#5c6f88" direction="rtl">«هیچ ملتی در تاریخ توسط نیروی خارجی</text>
<text x="540" y="1055" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#5c6f88" direction="rtl">به آزادی پایدار نرسیده است — مگر آنکه</text>
<text x="540" y="1090" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="20" fill="#5c6f88" direction="rtl">خود نیز ظرفیت نگهداری آزادی را داشته باشد.»</text>
<text x="540" y="1120" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="16" fill="#3d4f65" direction="rtl">— تز اصلی کتاب</text>
<!-- disciplines -->
<rect x="180" y="1200" width="720" height="50" rx="25" fill="#1a2540" stroke="#253350" stroke-width="1"/>
<text x="540" y="1233" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="18" fill="#5580aa" direction="rtl">تاریخ · حقوق · علوم سیاسی · روان‌شناسی · اقتصاد</text>
</svg>