<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2400" viewBox="0 0 1600 2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#060a14"/><stop offset="45%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#150d28"/>
    </linearGradient>
    <radialGradient id="gl" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#1a3f6f" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#0f1729" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2=".2">
      <stop offset="0%" stop-color="#00e5ff"/><stop offset="50%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#ff80ab"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#0091ea"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4081"/><stop offset="100%" stop-color="#c51162"/>
    </linearGradient>
    <linearGradient id="br" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity=".5"/>
      <stop offset="33%" stop-color="#7c4dff" stop-opacity=".25"/>
      <stop offset="66%" stop-color="#ff4081" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#ffd740" stop-opacity=".25"/>
    </linearGradient>
    <filter id="gw"><feGaussianBlur stdDeviation="6"/><feComposite in="SourceGraphic" operator="over"/></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="18"/><feComposite in="SourceGraphic" operator="over"/></filter>
  </defs>

  <rect width="1600" height="2400" fill="url(#bg)"/>
  <rect width="1600" height="2400" fill="url(#gl)"/>

  <!-- stars -->
  <g fill="#fff" opacity=".5">
    <circle cx="120" cy="90" r="1.2"/><circle cx="340" cy="200" r="1"/>
    <circle cx="580" cy="120" r="1.5"/><circle cx="780" cy="60" r="1"/>
    <circle cx="1050" cy="180" r="1.3"/><circle cx="1320" cy="100" r="1"/>
    <circle cx="1480" cy="250" r="1.5"/><circle cx="200" cy="400" r="1"/>
    <circle cx="450" cy="520" r="1.2"/><circle cx="1400" cy="450" r="1.3"/>
    <circle cx="100" cy="700" r="1"/><circle cx="1500" cy="680" r="1.2"/>
    <circle cx="300" cy="1600" r="1"/><circle cx="1350" cy="1700" r="1.5"/>
    <circle cx="180" cy="1900" r="1.2"/><circle cx="1450" cy="2000" r="1"/>
    <circle cx="500" cy="2200" r="1.3"/><circle cx="1100" cy="2300" r="1"/>
    <circle cx="750" cy="380" r="1.5"/><circle cx="900" cy="550" r="1"/>
    <circle cx="250" cy="1100" r="1.2"/><circle cx="1380" cy="1200" r="1"/>
    <circle cx="680" cy="1850" r="1"/><circle cx="950" cy="2100" r="1.3"/>
  </g>
  <g fill="#00e5ff" opacity=".3">
    <circle cx="650" cy="300" r="2"/><circle cx="1000" cy="500" r="1.8"/>
    <circle cx="400" cy="800" r="1.5"/><circle cx="1200" cy="900" r="2"/>
  </g>

  <!-- decorative border -->
  <rect x="55" y="55" width="1490" height="2290" rx="24" fill="none" stroke="url(#br)" stroke-width="1.5" opacity=".35"/>
  <rect x="70" y="70" width="1460" height="2260" rx="18" fill="none" stroke="url(#br)" stroke-width=".5" opacity=".2"/>

  <!-- broken chain – left link -->
  <g transform="translate(620,780) rotate(-20)" filter="url(#gw)">
    <ellipse rx="65" ry="110" fill="none" stroke="url(#c1)" stroke-width="18" stroke-linecap="round"/>
  </g>
  <!-- broken chain – right link -->
  <g transform="translate(980,800) rotate(20)" filter="url(#gw)">
    <ellipse rx="65" ry="110" fill="none" stroke="url(#c2)" stroke-width="18" stroke-linecap="round"/>
  </g>
  <!-- sparks -->
  <g filter="url(#gw)" opacity=".9">
    <line x1="740" y1="790" x2="775" y2="750" stroke="#ffd740" stroke-width="3"/>
    <line x1="760" y1="810" x2="800" y2="785" stroke="#ff4081" stroke-width="2.5"/>
    <line x1="750" y1="835" x2="795" y2="855" stroke="#00e5ff" stroke-width="2"/>
    <line x1="770" y1="770" x2="810" y2="740" stroke="#69f0ae" stroke-width="2"/>
    <circle cx="790" cy="790" r="5" fill="#ffd740" opacity=".9"/>
    <circle cx="815" cy="810" r="4" fill="#ff4081" opacity=".7"/>
    <circle cx="770" cy="770" r="3.5" fill="#00e5ff" opacity=".8"/>
    <circle cx="800" cy="830" r="3" fill="#69f0ae" opacity=".6"/>
    <circle cx="780" cy="750" r="2" fill="#fff" opacity=".5"/>
  </g>

  <!-- title -->
  <text x="800" y="1120" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="140" font-weight="900" fill="url(#tg)" direction="rtl" filter="url(#sg)">ناجی نمی‌آید</text>

  <!-- subtitles -->
  <text x="800" y="1270" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="48" fill="#d0d8e0" direction="rtl" letter-spacing="2">تحلیل انتقادی نجات‌طلبی ملت‌ها</text>
  <text x="800" y="1345" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="48" fill="#d0d8e0" direction="rtl" letter-spacing="2">از قدرت‌های بیگانه</text>

  <!-- separator -->
  <line x1="520" y1="1420" x2="1080" y2="1420" stroke="url(#br)" stroke-width="2" opacity=".5"/>

  <!-- era range -->
  <text x="800" y="1500" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="36" fill="#5a7a9a" direction="rtl">از هخامنشیان تا بهار عربی</text>

  <!-- bottom -->
  <line x1="520" y1="2070" x2="1080" y2="2070" stroke="url(#br)" stroke-width="1" opacity=".35"/>
  <text x="800" y="2150" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="38" fill="#607a94" direction="rtl">تاریخ · حقوق بین‌الملل · علوم سیاسی</text>
  <text x="800" y="2220" text-anchor="middle" font-family="Vazirmatn,IRANSans,Tahoma,sans-serif" font-size="32" fill="#4a6070" direction="rtl">روان‌شناسی اجتماعی · فلسفه‌ی سیاسی</text>
</svg>